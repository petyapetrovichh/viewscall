justifyContent: 'center', gap: 8,\n                  boxShadow: isPicked && pickedKey.side === 'YES' ? '0 0 0 3px var(--vc-surface), 0 0 0 5.5px var(--vc-red)' : 'none',\n                }}>\n                  YES <span className=\"tab-nums\" style={{ background: 'rgba(255,255,255,0.22)', padding: '2px 7px', borderRadius: 999, fontSize: 11 }}>{t.yes}%</span>\n                </button>\n                <button onClick={() => onPick(i, 'NO')} className=\"btn-reset press\" style={{\n                  flex: 1, height: 44, borderRadius: 14,\n                  background: 'var(--vc-no)', color: 'white', fontWeight: 700, fontSize: 14,\n                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,\n                  boxShadow: isPicked && pickedKey.side === 'NO' ? '0 0 0 3px var(--vc-surface), 0 0 0 5.5px var(--vc-no)' : 'none',\n                }}>\n                  NO <span className=\"tab-nums\" style={{ background: 'rgba(255,255,255,0.22)', padding: '2px 7px', borderRadius: 999, fontSize: 11 }}>{100 - t.yes}%</span>\n                </button>\n              </div>\n\n              {isPicked && (\n                <VCTierChart\n                  tier={t}\n                  side={pickedKey.side}\n                  current={t.yes}\n                  onClose={() => setPickedKey(null)}\n                  onConfirm={() => setPickedKey(null)}\n                />\n              )}\n            </div>\n            );\n          })}\n        </div>\n\n        {/* about */}\n        <div className=\"card\" style={{ padding: 14, marginBottom: 14 }}>\n          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>\n            <span className=\"display\" style={{ fontSize: 15, fontWeight: 800 }}>About this market</span>\n          </div>\n          <ul style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.55, color: 'var(--vc-ink-2)' }}>\n            <li>Each tier resolves YES if the video's view count is \u2265 that tier at 00:00 UTC on the resolution date.</li>\n            <li>Source: YouTube Data API v3 \u2014 videos.list endpoint, <code style={{ background: 'var(--vc-bg)', padding: '1px 4px', borderRadius: 4, fontSize: 11 }}>statistics.viewCount</code>.</li>\n            <li>Markets cannot be edited after publish.</li>\n          </ul>\n        </div>\n\n        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>\n          <VCVolChip vol={market.vol} />\n          <span style={{ fontSize: 12, color: 'var(--vc-ink-2)', fontWeight: 600 }}>\n            <span className=\"tab-nums\">{(market.vol / 50).toFixed(0)}</span> predictors\n          </span>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Leaderboard \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCLeaderboard({ onOpenUser }) {\n  const [scope, setScope] = useState('Global');\n  const [time, setTime] = useState('Week');\n  const [follows, setFollows] = useState({});\n  const toggleFollow = (uid) => setFollows((p) => ({ ...p, [uid]: !p[uid] }));\n\n  // Time scaling: profit grows from Today \u2192 Week \u2192 Month \u2192 All. Accuracy & preds\n  // also nudge up over longer windows. Deterministic per user+scope+time.\n  const TIME = {\n    Today: { mult: 0.16, label: 'Today',      accAdj: -4, predMult: 0.12 },\n    Week:  { mult: 1.0,  label: 'This week',  accAdj: 0,  predMult: 1.0  },\n    Month: { mult: 4.3,  label: 'This month', accAdj: 3,  predMult: 4.1  },\n    All:   { mult: 22.0, label: 'All time',   accAdj: 6,  predMult: 19.0 },\n  };\n  const PODIUM_LABEL = { Today: 'TODAY', Week: 'THIS WEEK', Month: 'THIS MONTH', All: 'ALL TIME' };\n  const cfg = TIME[time];\n\n  const parseRoi = (s) => parseInt(String(s).replace(/[^\\d]/g, ''), 10) || 0;\n  const fmtMoney = (n) => '+$' + Math.round(n).toLocaleString();\n\n  // Deterministic reshuffle: each scope+time orders users a bit differently.\n  const hashKey = (uid) => {\n    let h = 0; const key = uid + scope + time;\n    for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) | 0;\n    return Math.abs(h);\n  };\n\n  const leaders = VC_LEADERS.map((l) => {\n    const baseRoi = parseRoi(l.roi);\n    const jitter = 0.55 + (hashKey(l.user) % 90) / 100; // 0.55\u20131.44, stable per scope+time \u2192 reshuffles ranks\n    const profit = baseRoi * cfg.mult * jitter;\n    const acc = Math.max(40, Math.min(96, l.acc + cfg.accAdj + (hashKey(l.user) % 5) - 2));\n    const preds = Math.max(3, Math.round(l.preds * cfg.predMult));\n    return { ...l, profit, acc, preds };\n  }).sort((a, b) => b.profit - a.profit);\n\n  const top3 = leaders.slice(0, 3);\n  const rest = leaders.slice(3);\n\n  // Own profile row, scaled the same way.\n  const meProfit = 124 * cfg.mult * 1.0;\n  const meRank = 44 + (hashKey('marcus') % 8);\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      <div style={{ padding: '8px 20px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n        <h2 className=\"vc-page-title\">Top Callers</h2>\n      </div>\n\n      {/* filters */}\n      <div style={{ padding: '0 20px 8px', display: 'flex', justifyContent: 'center' }}>\n        <VCSegmented value={scope} onChange={setScope} options={['Global', 'Friends']} />\n      </div>\n      <div style={{ padding: '0 20px 14px', display: 'flex', justifyContent: 'center' }}>\n        <VCSegmented value={time} onChange={setTime} options={['Today', 'Week', 'Month', 'All']} height={30} fontSize={12} />\n      </div>\n\n      {/* podium */}\n      <div style={{ padding: '12px 20px 18px' }}>\n        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: 12, position: 'relative' }}>\n          <VCPodiumTile rank={2} leader={top3[1]} onOpen={onOpenUser} h={130} timeLabel={PODIUM_LABEL[time]} />\n          <VCPodiumTile rank={1} leader={top3[0]} onOpen={onOpenUser} h={170} crown timeLabel={PODIUM_LABEL[time]} />\n          <VCPodiumTile rank={3} leader={top3[2]} onOpen={onOpenUser} h={110} timeLabel={PODIUM_LABEL[time]} />\n        </div>\n      </div>\n\n      {/* ranked list \u2014 separate cards (Bagel style) */}\n      <div style={{ padding: '0 14px' }}>\n        {rest.map((l, i) => (\n          <VCLeaderCard key={l.user} rank={i + 4} leader={l} fmtMoney={fmtMoney}\n            following={!!follows[l.user]} onToggleFollow={() => toggleFollow(l.user)}\n            onOpen={() => onOpenUser(l.user)} />\n        ))}\n\n        {/* your own profile card \u2014 data pulled from the Me profile */}\n        <VCLeaderCard rank={meRank} me meName=\"Petr Osipov\"\n          leader={{ user: 'marcus', acc: 52, preds: Math.round(239 * cfg.predMult), profit: meProfit }}\n          fmtMoney={fmtMoney}\n          following={false} onToggleFollow={() => {}}\n          onOpen={() => {}} />\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Leaderboard ranked card (Bagel-style, one card per trader) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCLeaderCard({ rank, leader, fmtMoney, following, onToggleFollow, onOpen, me = false, meName }) {\n  const u = vcUser(leader.user);\n  if (!u) return null;\n  const showX = vcHasXHandle(leader.user);\n  return (\n    <div className=\"card\" style={{ padding: 14, marginBottom: 12, position: 'relative', ...(me ? { border: '1.5px solid var(--vc-red)' } : null) }}>\n      {/* top row: rank + avatar + name/handle + follow */}\n      <div onClick={onOpen} role=\"button\" tabIndex={0}\n        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onOpen(); } }}\n        style={{\n        width: '100%', display: 'flex', alignItems: 'center', gap: 12, textAlign: 'left', cursor: 'pointer',\n      }}>\n        <span className=\"tab-nums display\" style={{ width: 22, textAlign: 'center', fontWeight: 800, fontSize: 15, color: me ? 'var(--v 50%)',\n              width: 12, height: 12, borderRadius: '50%', background: 'var(--vc-red)',\n              boxShadow: '0 0 0 4px var(--vc-red-soft)',\n            }} />\n          </div>\n\n          {/* range segmented control */}\n          <VCSegmented value={range} onChange={setRange} height={34} fontSize={14} fullWidth options={[\n            { id: '1D', label: '1D' }, { id: '1W', label: '1W' },\n            { id: '1M', label: '1M' }, { id: 'All', label: 'All' },\n          ]} />\n        </div>\n\n        {/* \u2500\u2500 Portfolio card (no \"Available\" pill) \u2500\u2500 */}\n        <div className=\"card\" style={{ padding: 18, borderRadius: 22, marginTop: 16 }}>\n          <div style={{ fontSize: 16, color: 'var(--vc-ink-2)', marginBottom: 4 }}>Portfolio</div>\n          <div className=\"display tab-nums\" style={{ fontSize: 30, fontWeight: 500, letterSpacing: '-0.02em', marginBottom: 16 }}>$0</div>\n          <div style={{ display: 'flex', gap: 12 }}>\n            <button className=\"btn-reset press vc-btn-grad\" style={{\n              flex: 1, height: 44, borderRadius: 999, background: 'var(--vc-red)',\n              color: 'white', fontWeight: 600, fontSize: 14,\n              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7,\n            }}>\n              <MoneyIcon dir=\"down\" /> Add Funds\n            </button>\n            <button className=\"btn-reset press vc-btn-grad\" style={{\n              flex: 1, height: 44, borderRadius: 999, background: 'var(--vc-red)',\n              color: 'white', fontWeight: 600, fontSize: 14,\n              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7,\n            }}>\n              <MoneyIcon dir=\"up\" /> Withdraw\n            </button>\n          </div>\n        </div>\n\n        {/* \u2500\u2500 Rewards card \u2500\u2500 */}\n        <button onClick={() => onOpenRewards && onOpenRewards()} className=\"btn-reset press\" style={{ width: '100%', textAlign: 'left', marginTop: 16 }}>\n          <div className=\"card\" style={{ padding: 18, borderRadius: 22, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n            <div>\n              <div style={{ fontSize: 16, color: 'var(--vc-ink-2)', marginBottom: 4, display: 'flex', alignItems: 'center', gap: 6 }}>\n                <span>Rewards</span><span style={{ fontSize: 17 }}>\ud83e\ude99</span>\n              </div>\n              <div className=\"display tab-nums\" style={{ fontSize: 30, fontWeight: 500, letterSpacing: '-0.02em', marginBottom: 2 }}>$0</div>\n              <div style={{ fontSize: 14 }}>\n                <span className=\"tab-nums\" style={{ fontWeight: 500 }}>0</span>\n                <span style={{ color: 'var(--vc-ink-2)' }}> Friends Invited</span>\n              </div>\n            </div>\n            <span style={{ color: 'var(--vc-ink-3)', flexShrink: 0 }}>{VCIcon.chevR('var(--vc-ink-3)', 22)}</span>\n          </div>\n        </button>\n\n        {/* \u2500\u2500 Positions / History segmented + View All \u2500\u2500 */}\n        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', margin: '22px 4px 4px' }}>\n          <VCSegmented value={tab} onChange={setTab} height={34} fontSize={14} fullWidth options={[\n            { id: 'positions', label: 'Positions' },\n            { id: 'history', label: 'History' },\n          ]} />\n          <button onClick={() => onViewAll && onViewAll(tab)} className=\"btn-reset press\" style={{\n            display: 'inline-flex', alignItems: 'center', gap: 3,\n            fontSize: 16, fontWeight: 600, color: 'var(--vc-ink)',\n            textDecoration: 'underline', textUnderlineOffset: 3,\n          }}>\n            View All {VCIcon.chevR('var(--vc-ink)', 16)}\n          </button>\n        </div>\n\n        {/* \u2500\u2500 Empty state \u2500\u2500 */}\n        <div style={{\n          display: 'flex', flexDirection: 'column', alignItems: 'center',\n          textAlign: 'center', padding: '140px 24px 40px',\n        }}>\n          <div style={{ fontSize: 48, marginBottom: 18, lineHeight: 1 }}>\n            {tab === 'positions' ? '\ud83e\uded9' : '\u23f3'}\n          </div>\n          <div className=\"display\" style={{ fontSize: 24, fontWeight: 500, marginBottom: 8 }}>\n            {tab === 'positions' ? 'No Positions yet' : 'No Activity Yet'}\n          </div>\n          <div style={{ fontSize: 17, color: 'var(--vc-ink-2)', lineHeight: 1.4, maxWidth: 300, marginBottom: 26 }}>\n            {tab === 'positions'\n              ? <React.Fragment>Your predictions will appear here.<br/>Start trading today.</React.Fragment>\n              : 'Your trades, rewards, and market resolutions will be recorded here.'}\n          </div>\n          <button onClick={onOpenPost} className=\"btn-reset press vc-btn-grad\" style={{\n            height: 44, padding: '0 26px', borderRadius: 999, background: 'var(--vc-red)',\n            color: 'white', fontWeight: 600, fontSize: 14,\n          }}>Explore ViewsCall</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Open-position card on a user profile (Create-style preview + bet line) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCUserPositionCard({ pos, onOpenMarket }) {\n  const v = vcVideo(pos.video);\n  const m = pos.market;\n  // Build a market for this video the same way the feed does (curated if present,\n  // otherwise 2\u20135 deterministic tiers around the position's milestone).\n  const buildMarket = () => {\n    const matched = VC_EXPLORE_MARKETS.find((em) => em.video === pos.video);\n    if (matched) return matched;\n    let h = 0; const seed = pos.id || pos.video;\n    for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0;\n    const rnd = (n) => Math.abs((h = (h * 1103515245 + 12345) | 0)) % n;\n    const count = 2 + rnd(4);\n    const baseIdx = rnd(count);\n    const tiers = [];\n    for (let i = 0; i < count; i++) {\n      const step = i - baseIdx;\n      const gt = Math.max(1, Math.round(m.tier * Math.pow(1.6, step)));\n      const yes = Math.max(5, Math.min(96, Math.round(m.yes - step * (10 + rnd(8)))));\n      tiers.push({ gt, yes });\n    }\n    return {\n      id: 'm_' + (pos.id || pos.video), video: pos.video, tiers,\n      deadline: (m.deadline || '').replace('Resolves in ', '').replace('Resolves ', ''),\n      vol: m.vol,\n    };\n  };\n  const openMarket = () => onOpenMarket && onOpenMarket(buildMarket());\n  const isYes = pos.side === 'YES';\n  const entry = pos.entry;\n  const current = useLiveValue(m.yes, { min: 1, max: 99, amp: 2, decimals: 1 });\n  const { profit, roiPct } = vcPositionROI(pos.side, entry, current, pos.stake);\n  const probUp = current >= entry;\n  const pillBg = isYes ? 'rgba(22,163,74,0.12)' : 'rgba(217,48,37,0.12)';\n  const pillText = isYes ? 'var(--vc-success)' : 'var(--vc-danger)';\n  const fmt$ = (n) => { const a = Math.abs(n); return (n < 0 ? '-' : '') + '$' + (a >= 1000 ? (a/1000).toFixed(2) + 'k' : a.toFixed(2)); };\n  return (\n    <div className=\"card press\" onClick={openMarket} role=\"button\" tabIndex={0}\n      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openMarket(); } }}\n      style={{ padding: 14, marginBottom: 12, cursor: 'pointer' }}>\n      {/* Create-style preview: thumb left, title right (centered) */}\n      <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>\n        <div style={{ width: 96, height: 64, flexShrink: 0 }}>\n          <VCThumb video={v} height={64} rounded={10} />\n        </div>\n        <div style={{ flex: 1, minWidth: 0 }}>\n          <div style={{ fontSize: 13.5, fontWeight: 700, lineHeight: 1.3 }}>{m.question}</div>\n        </div>\n      </div>\n\n      {/* dashed divider to card edges */}\n      <div style={{ marginTop: 12, paddingTop: 12, marginLeft: -14, marginRight: -14, paddingLeft: 14, paddingRight: 14, borderTop: '1px dashed var(--vc-line)' }}>\n        {/* line 1: side pill + stake */}\n        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>\n          <div style={{ display: 'inline-flex', alignItems: 'center', padding: '5px 11px', borderRadius: 10, background: pillBg, color: pillText, fontWeight: 800, fontSize: 13.5 }}>\n            <span>{isYes ? 'Yes' : 'No'}&nbsp;</span><span className=\"tab-nums\">{entry}%</span>\n          </div>\n          <div className=\"display tab-nums\" style={{ fontSize: 20, fontWeight: 800, letterSpacing: '-0.02em' }}>${pos.stake.toLocaleString()}</div>\n        </div>\n        {/* line 2: entry -> current + ROI */}\n        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13.5, fontWeight: 600, color: 'var(--vc-ink-2)' }}>\n            <span className=\"tab-nums\">{entry}%</span>\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke={probUp ? 'var(--vc-success)' : 'var(--vc-danger)'} strokeWidth=\"2.6\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n              {probUp ? <g><path d=\"M7 17L17 7\" /><path d=\"M9 7h8v8\" /></g> : <g><path d=\"M7 7l10 10\" /><path d=\"M17 9v8H9\" /></g>}\n            </svg>\n            <span className=\"tab-nums\" style={{ color: 'var(--vc-ink)', fontWeight: 700 }}><VCLiveNumber value={current} format={(x) => x.toFixed(1) + '%'} /></span>\n          </div>\n          <div className=\"tab-nums\" style={{ fontSize: 13.5, fontWeight: 800, color: profit >= 0 ? 'var(--vc-success)' : 'var(--vc-danger)' }}>\n            <VCLiveNumber value={current} format={() => (profit >= 0 ? '+' : '') + fmt$(profit)} /> <span style={{ fontWeight: 700 }}>(<VCLiveNumber value={current} format={() => (profit >= 0 ? '+' : '') + roiPct.toFixed(2) + '%'} />)</span>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Other user's profile page (mirrors Me tab, with back) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCUserProfile({ userId, onBack, onOpenPost, onShare, onOpenComments, onOpenMarket, onOpenUser }) {\n  const u = vcUser(userId);\n  const [range, setRange] = useState('1D');\n  const [tab, setTab] = useState('calls');   // calls / positions / history\n  const [following, setFollowing] = useState(false);\n\n  // Stable per-user hash for deterministic numbers.\n  const hash = (() => { let h = 0; for (let i = 0; i < userId.length; i++) h = (h * 31 + userId.charCodeAt(i)) | 0; return Math.abs(h); })();\n  const showX = vcHasXHandle(userId);\n  const followingCount = 40 + (hash % 900);\n  const followersCount = 200 + (hash % 9000);\n  const positionsUsd = 5000 + (hash % 45000);\n  const predictions = 60 + (hash % 380);\n\n  // Per-user P/L: scale the shared chart value; sign is stable per user.\n  const pnlBaseRaw = VC_PNL_DATA[range] || VC_PNL_DATA['1D'];\n  const scale = 0.4 + (hash % 260) / 100;             // 0.4\u20133.0\n  const positiveUser = (hash % 5) !== 0;              // ~80% in profit\n  const rawVal = Math.round((300 + (hash % 9000)) * scale * (range === '1D' ? 0.2 : range === '1W' ? 1 : range === '1M' ? 3.6 : 14));\n  const pnlValue = (positiveUser ? '+$' : '-$') + rawVal.toLocaleString();\n  const pnlColor = positiveUser ? 'var(--vc-success)' : 'var(--vc-red)';\n  const pnlStroke = 'var(--vc-red)'; // chart line always red, like the Me profile\n  // The shared path's own trend must match the user's profit sign; if it doesn't,\n  // flip the path vertically (y -> 90 - y) so an \"up\" chart never shows a loss.\n  const flipY = (d) => d.replace(/(-?[\\d.]+)\\s+(-?[\\d.]+)/g, (mm, x, y) => x + ' ' + (90 - parseFloat(y)).toFixed(1));\n  const pnlBase = positiveUser === pnlBaseRaw.positive\n    ? pnlBaseRaw\n    : { ...pnlBaseRaw, d: flipY(pnlBaseRaw.d), endY: 90 - pnlBaseRaw.endY };\n\n  // Calls: this user's feed posts, else a couple of random feed posts.\n  const ownPosts = VC_FEED.filter((p) => p.user === userId);\n  const calls = ownPosts.length > 0 ? ownPosts : VC_FEED.slice(hash % 4, (hash % 4) + 2);\n\n  // Positions: some users empty, others hold open positions (built from feed posts).\n  const hasPositions = (hash % 3) !== 0;\n  const positions = hasPositions\n    ? VC_FEED.slice(hash % 5, (hash % 5) + 1 + (hash % 3)).map((p) => ({\n        id: p.id, video: p.video, market: p.market, side: p.side, entry: p.entry, stake: p.stake,\n      }))\n    : [];\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      {/* Header */}\n      <div style={{ padding: '8px 20px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>\n        <VCBackButton onClick={onBack} />\n      </div>\n\n      <div style={{ padding: '0 16px' }}>\n        {/* Identity + P/L card */}\n        <div className=\"card\" style={{ padding: 18, borderRadius: 22, overflow: 'hidden' }}>\n          <div style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 14 }}>\n            <VCAvatar user={u} size={52} />\n            <div style={{ flex: 1, minWidth: 0 }}>\n              <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>\n                <span className=\"display\" style={{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.01em' }}>{u.name}</span>\n                {showX && (\n                  <a href=\"https://x.com/icebean10\" target=\"_blank\" rel=\"noopener noreferrer\" style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0, textDecoration: 'none' }}>\n                    <span style={{ width: 19, height: 19, borderRadius: 6, background: '#000', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>\n                      <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z\"/></svg>\n                    </span>\n                  </a>\n                )}\n              </div>\n              <div style={{ display: 'flex', gap: 14, marginTop: 4, fontSize: 14 }}>\n                <span><span className=\"tab-nums\" style={{ fontWeight: 600 }}>{followingCount}</span><span style={{ color: 'var(--vc-ink-2)' }}>&nbsp;Following</span></span>\n                <span><span className=\"tab-nums\" style={{ fontWeight: 600 }}>{followersCount.toLocaleString()}</span><span style={{ color: 'var(--vc-ink-2)' }}>&nbsp;Followers</span></span>\n              </div>\n            </div>\n          </div>\n\n          {/* Follow button (red) */}\n          <div style={{ marginTop: 14 }}>\n            <VCFollowButton following={following} accent height={38} onClick={() => setFollowing(!following)} />\n          </div>\n\n          {/* positions / predictions */}\n          <div style={{ display: 'flex', marginTop: 18 }}>\n            <div style={{ flex: 1 }}>\n              <div style={{ fontSize: 14, color: 'var(--vc-ink-2)', marginBottom: 2 }}>Positions</div>\n              <div className=\"display tab-nums\" style={{ fontSize: 22, fontWeight: 600 }}>${positionsUsd.toLocaleString()}</div>\n            </div>\n            <div style={{ flex: 1 }}>\n              <div style={{ fontSize: 14, color: 'var(--vc-ink-2)', marginBottom: 2 }}>Predictions</div>\n              <div className=\"display tab-nums\" style={{ fontSize: 22, fontWeight: 600 }}>{predictions}</div>\n            </div>\n          </div>\n\n          <div style={{ borderTop: '1px dashed var(--vc-line)', margin: '16px -18px' }} />\n\n          {/* profit / loss */}\n          <div style={{ fontSize: 15, color: 'var(--vc-ink-2)', marginBottom: 8 }}>Profit/Loss</div>\n          <VCRollingNumber value={pnlValue} fontSize={30} fontWeight={600} color={pnlColor} />\n\n          <div key={range} style={{ position: 'relative', height: 90, margin: '14px 0 18px', '--vc-line-len': '600' }}>\n            <svg width=\"100%\" height=\"90\" viewBox=\"0 0 320 90\" preserveAspectRatio=\"none\" style={{ display: 'block' }}>\n              <path className=\"vc-pnl-line\" d={pnlBase.d} fill=\"none\" stroke={pnlStroke} strokeWidth=\"3\" strokeLinecap=\"round\" strokeLinejoin=\"round\" />\n            </svg>\n            <div className=\"vc-pnl-dot\" style={{ position: 'absolute', right: 6, top: `${(pnlBase.endY / 90) * 100}%`, transform: 'translate(50%, -50%)', width: 12, height: 12, borderRadius: '50%', background: pnlStroke, boxShadow: '0 0 0 4px var(--vc-red-soft)' }} />\n          </div>\n\n          <VCSegmented value={range} onChange={setRange} height={34} fontSize={14} fullWidth options={[\n            { id: '1D', label: '1D' }, { id: '1W', label: '1W' }, { id: '1M', label: '1M' }, { id: 'All', label: 'All' },\n          ]} />\n        </div>\n\n        {/* Calls / Positions / History */}\n        <div style={{ margin: '22px 4px 12px' }}>\n          <VCSegmented value={tab} onChange={setTab} height={34} fontSize={13.5} fullWidth options={[\n            { id: 'calls', label: 'Calls' },\n            { id: 'positions', label: 'Positions' },\n            { id: 'history', label: 'History' },\n          ]} />\n        </div>\n      </div>\n\n      {/* Tab content */}\n      {tab === 'calls' && (\n        <div style={{ padding: '0 16px' }}>\n          {calls.map((p) => (\n            <VCFeedCard key={p.id} post={p}\n              onOpen={() => onOpenPost && onOpenPost(p)}\n              onShare={() => onShare && onShare(p)}\n              onOpenComments={onOpenComments}\n              onOpenMarket={onOpenMarket}\n              onOpenUser={onOpenUser} />\n          ))}\n        </div>\n      )}\n\n      {tab === 'positions' && (\n        positions.length > 0\n          ? <div style={{ padding: '0 16px' }}>\n              {positions.map((pos, i) => <VCUserPositionCard key={i} pos={pos} onOpenMarket={onOpenMarket} />)}\n            </div>\n          : <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', padding: '90px 24px 40px' }}>\n              <div style={{ fontSize: 48, marginBottom: 18, lineHeight: 1 }}>\ud83e\uded9</div>\n              <div className=\"display\" style={{ fontSize: 24, fontWeight: 500, marginBottom: 8 }}>No open positions</div>\n              <div style={{ fontSize: 17, color: 'var(--vc-ink-2)', lineHeight: 1.4, maxWidth: 300 }}>{u.name.split(' ')[0]} has no open positions right now.</div>\n            </div>\n      )}\n\n      {tab === 'history' && (\n        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', padding: '90px 24px 40px' }}>\n          <div style={{ fontSize: 48, marginBottom: 18, lineHeight: 1 }}>\u23f3</div>\n          <div className=\"display\" style={{ fontSize: 24, fontWeight: 500, marginBottom: 8 }}>No Activity Yet</div>\n          <div style={{ fontSize: 17, color: 'var(--vc-ink-2)', lineHeight: 1.4, maxWidth: 300 }}>Resolved trades will appear here.</div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n\nfunction VCViewAll({ initialTab, onBack, onExplore }) {\n  const [tab, setTab] = useState(initialTab === 'history' ? 'history' : 'positions');\n  const [sort, setSort] = useState('All');\n  const [sheet, setSheet] = useState(false);\n\n  const SORTS = ['All', 'Bought', 'Sold', 'Lost', 'Claimed', 'Deposited', 'Withdraw', 'Cashback'];\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 40px', minHeight: '100%' }}>\n      {/* header: back button */}\n      <div style={{ padding: '8px 16px 12px', display: 'flex', alignItems: 'center' }}>\n        <button onClick={onBack} className=\"btn-reset press\" style={{\n          width: 44, height: 44, borderRadius: 14, background: 'var(--vc-surface)',\n          border: '1px solid var(--vc-border)',\n "Total Earned\" /></div>;\n  if (view === 'invited') return <div className=\"screen-enter\" style={{ minHeight: '100%' }}><EmptyState title=\"Invited Friends\" /></div>;\n\n  // round share button helper\n  const ShareBtn = ({ bg, label, children }) => (\n    <button className=\"btn-reset press\" aria-label={label} style={{\n      width: 58, height: 58, borderRadius: '50%', background: bg,\n      display: 'flex', alignItems: 'center', justifyContent: 'center',\n      boxShadow: '0 4px 14px rgba(0,0,0,0.12)',\n    }}>{children}</button>\n  );\n\n  return (\n    <div className=\"screen-enter\" style={{ height: '100%', position: 'relative', display: 'flex', flexDirection: 'column' }}>\n      <Header title=\"Referral\" onLeft={onBack} />\n\n      <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '0 16px' }}>\n        <div style={{ fontSize: 44, lineHeight: 1, margin: '8px 0 14px' }}>\ud83e\ude99</div>\n        <div className=\"display\" style={{ fontSize: 30, fontWeight: 600, letterSpacing: '-0.02em', marginBottom: 6 }}>Invite &amp; Earn</div>\n        <div style={{ fontSize: 16, color: 'var(--vc-ink-2)', whiteSpace: 'nowrap', marginBottom: 22 }}>\n          Get 10% of every trade fee your friends make\n        </div>\n\n        {/* claim card */}\n        <div className=\"card\" style={{ padding: 18, borderRadius: 22 }}>\n          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n            <div>\n              <div style={{ fontSize: 15, color: 'var(--vc-ink-2)', marginBottom: 2 }}>Available to Claim</div>\n              <div className=\"display tab-nums\" style={{ fontSize: 30, fontWeight: 600, letterSpacing: '-0.02em' }}>$0</div>\n            </div>\n            <button className=\"btn-reset press vc-btn-grad\" style={{\n              height: 34, padding: '0 18px', borderRadius: 999, background: 'var(--vc-red)',\n              color: 'white', fontWeight: 600, fontSize: 13, flexShrink: 0,\n            }}>Claim< ton onClick={() => setSignSheet(true)} className=\"btn-reset press card\" style={{\n          width: '100%', padding: '0 16px', height: 58, borderRadius: 16, marginTop: 4,\n          display: 'flex', alignItems: 'center', gap: 12,\n          color: 'var(--vc-red)', fontWeight: 600, fontSize: 16,\n        }}>\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--vc-red)\" strokeWidth=\"1.9\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n            <path d=\"M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4\" /><path d=\"M16 17l5-5-5-5\" /><path d=\"M21 12H9\" />\n          </svg>\n          Sign Out\n        </button>\n\n        {/* footer: ViewsCall logo + version */}\n        <div style={{ textAlign: 'center', padding: '36px 0 12px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>\n          <VCLogo size={22} />\n          <div style={{ fontSize: 13, color: 'var(--vc-ink-3)' }}>Version 1.0.0</div>\n        </div>\n      </div>\n\n      {/* Sign Out confirmation sheet */}\n      {signSheet && (\n        <div onClick={() => setSignSheet(false)} style={{\n          position: 'absolute', inset: 0, zIndex: 60, touchAction: 'none', overscrollBehavior: 'none',\n          background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'flex-end',\n          animation: 'vcFadeIn 0.2s ease',\n        }}>\n          <div onClick={(e) => e.stopPropagation()} className=\"sheet-enter\" style={{\n            width: '100%', background: 'var(--vc-surface)',\n            borderTopLeftRadius: 26, borderTopRightRadius: 26,\n            padding: '18px 16px calc(100px + env(safe-area-inset-bottom, 0px))',\n          }}>\n            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>\n              <div style={{ flex: 1 }} />\n              <div className=\"display\" style={{ fontSize: 19, fontWeight: 600 }}>Sign Out?</div>\n              <div style={{ flex: 1, display: 'f  6.9c.4-.36-.09-.56-.62-.2L6.6 13.06l-4.98-1.56c-1.08-.34-1.1-1.08.23-1.6L20.5 2.9c.9-.33 1.7.22 1.44 1.7z\"/></svg> },\n          { bg: '#FF0000', icon: <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.2 3.6z\"/></svg> },\n          { bg: 'instagram', icon: <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"5\" /><circle cx=\"12\" cy=\"12\" r=\"4\" /><circle cx=\"17.5\" cy=\"6.5\" r=\"1.2\" fill=\"white\" stroke=\"none\" /></svg> },\n          { bg: '#000000', icon: <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M16.6 5.8a4.3 4.3 0 0 1-1-2.8h-3.3v12.9a2.6 2.6 0 1 1-2.6-2.6c.27 0 .53.04.78.12V9.9a6 6 0 0 0-.78-.05A5.95 5.95 0 1 0 15.6 15.8V9.3a7.5 7.5 0 0 0 4.4 1.4V7.4a4.3 4.3 0 0 1-3.4-1.6z\"/></svg> },\n          { bg: '#1877F2', icon: <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M24 12a12 12 0 1 0-13.88 11.85v-8.38H7.08V12h3.04V9.36c0-3 1.79-4.67 4.53-4.67 1.31 0 2.69.24 2.69.24v2.95h-1.51c-1.49 0-1.96.93-1.96 1.87V12h3.33l-.53 3.47h-2.8v8.38A12 12 0 0 0 24 12z\"/></svg> },\n        ];\n        return (\n          <div onClick={() => setChannelsSheet(false)} style={{\n            position: 'absolute', inset: 0, zIndex: 60, touchAction: 'none', overscrollBehavior: 'none',\n            background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'flex-end',\n            animation: 'vcFadeIn 0.2s ease',\n          }}>\n            <div onClick={(e) => e.stopPropagation()} className=\"sheet-enter\" style={{\n              width: '100%', background: 'var(--vc-surface)',\n              borderTopLeftRadius: 26, borderTopRightRadius: 26,\n              padding: '18px 16px 0', maxHeight: '86%', display: 'flex', flexDirection: 'column',\n            }}>\n              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18, flexShrink: 0 }}>\n                <div style={{ flex: 1 }} />\n                <div className=\"display\" style={{ fontSize: 19, fontWeight: 600 }}>Official Channels</div>\n                <div style={{ flex: 1, display: 'flex', justifyContent: 'flex-end' }}>\n                  <button onClick={() => setChannelsSheet(false)} className=\"btn-reset press\" style={{\n                    width: 40, height: 40, borderRadius: 12, background: 'var(--vc-surface)',\n                    border: '1px solid var(--vc-border)',\n                    display: 'flex', alignItems: 'center', justifyContent: 'center',\n                  }}>\n                    <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--vc-ink)\" strokeWidth=\"2.4\" strokeLinecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"/></svg>\n                  </button>\n                </div>\n              </div>\n\n              <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', touchAction: 'pan-y', overscrollBehavior: 'contain', display: 'flex', flexDirection: 'column', gap: 10, paddingBottom: 'calc(100px + env(safe-area-inset-bottom, 0px))' }}>\n                {channels.map((c, i) => (\n                  <button key={i} className=\"btn-reset press\" style={{\n                    height: 60, padding: '0 16px', borderRadius: 16, background: 'var(--vc-bg-2)',\n                    display: 'flex', alignItems: 'center', gap: 14, textAlign: 'left',\n                  }}>\n                    <span style={{\n                      width: 38, height: 38, borderRadius: 11, flexShrink: 0,\n                      background: c.bg === 'instagram'\n                        ? 'radial-gradient(circle at 30% 110%, #FEDA75, #FA7E1E 25%, #D62976 50%, #962FBF 75%, #4F5BD5)'\n                        : c.bg,\n                      display: 'flex', alignItems: 'center', justifyContent: 'center',\n                    }}>{c.icon}</span>\n                    <span style={{ flex: 1, fontWeight: 600, fontSize: 16 }}>Follow @viewscall</span>\n                    <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--vc-ink-3)\" strokeWidth=\"2.1\" strokeLinecap=\"round\" strokeLinejoin=\"round\"><path d=\"M7 17L17 7\" /><path d=\"M8 7h9v9\" /></svg>\n                  </button>\n                ))}\n              </div>\n            </div>\n          </div>\n        );\n      })()}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Followers / Following \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCFollows({ initialTab, onBack, onOpenUser }) {\n  const [tab, setTab] = useState(initialTab || 'following');\n  const list = Object.keys(VC_USERS).filter(u => u !== 'marcus');\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      <div style={{ padding: '4px 16px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>\n        <VCBackButton onClick={onBack} />\n        <div className=\"display\" style={{ fontSize: 18, fontWeight: 800 }}>@marcus.calls</div>\n      </div>\n\n      <div style={{ padding: '0 16px 14px', display: 'flex', justifyContent: 'center' }}>\n        <VCSegmented value={tab} onChange={setTab} fullWidth height={36} fontSize={13}\n          options={[{ id: 'following', label: '184 Following' }, { id: 'followers', label: '2.4k Followers' }]} />\n      </div>\n\n      <div style={{ padding: '0 14px' }}>\n        {list.map(uid => {\n          const u = vcUser(uid);\n          return (\n            <div key={uid} className=\"card press\" onClick={() => onOpenUser && onOpenUser(uid)} role=\"button\" tabIndex={0} style={{\n              padding: 12, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',\n            }}>\n              <VCAvatar user={u} size={46} />\n              <div style={{ flex: 1, minWidth: 0 }}>\n                <div style={{ fontWeight: 700, fontSize: 14 }}>{u.name}</div>\n                <div style={{ color: 'var(--vc-ink-2)', fontSize: 12 }}>\n                  @{u.handle} \u00b7 <span className=\"tab-nums\">{55 + (uid.length * 3) % 25}% acc</span>\n                </div>\n              </div>\n              <VCFollowButton following={tab === 'following'} height={32} accent />\n            </div>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\nObject.assign(window, { VCProfile, VCSettings, VCFollows });\n\n\n// ===== be36ac64-7f24-4969-8c41-185131311bf9.js =====\n// ViewsCall \u2014 Create Market, Search, Notifications overlays\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Create Market \u2014 3 step \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCCreateMarket({ onClose, onPublish, onOpenMarket }) {\n  const [step, setStep] = useState(1);\n  const [url, setUrl] = useState('');\n  const [video, setVideo] = useState(null);\n  const [date, setDate] = useState('2026-06-15');\n  const [tiers, setTiers] = useState([\n    { gt: 5_000_000 },\n    { gt: 10_000_000 },\n    { gt: 25_000_000 },\n  ]);\n  const [urlError, setUrlError] = useState(null);\n  const [existing, setExisting] = useState(null); // matched curated market, if the video already has one\n\n  const handleParse = () => {\n    if (!url || url.length < 8) {\n      setUrlError(\"Couldn't read that link. Try a full YouTube URL.\");\n      return;\n    }\n    // Demo: resolve the link to a sample video.\n    const sample = VC_VIDEOS[Math.floor(Math.random() * VC_VIDEOS.length)];\n    setVideo(sample);\n    setUrlError(null);\n    // Dedup: if a market already exists for this video, surface it instead of\n    // forcing the user to create a duplicate \u2014 they can bet directly.\n    const match = VC_EXPLORE_MARKETS.find((em) => em.video === sample.id);\n    if (match) {\n      setExisting(match);\n    } else {\n      setExisting(null);\n      setTimeout(() => setStep(2), 250);\n    }\n  };\n\n  // Reset back to the URL step (e.g. \"create one anyway\" or trying another link).\n  const resetToUrl = () => { setExisting(null); setVideo(null); };\n  const createAnyway = () => { setExisting(null); setTimeout(() => setStep(2), 120); };\n\n  return (\n    <div style={{\n      position: 'absolute', inset: 0, zIndex: 100,\n      background: 'rgba(15,15,15,0.4)',\n      backdropFilter: 'blur(4px)',\n      WebkitBackdropFilter: 'blur(4px)',\n      display: 'flex', flexDirection: 'column',\n    }} className=\"screen-enter\">\n      <div style={{\n        marginTop: 60, flex: 1,\n        background: 'var(--vc-bg)',\n        borderRadius: '24px 24px 0 0',\n        display: 'flex', flexDirection: 'column',\n        overflow: 'hidden',\n      }} className=\"sheet-enter\">\n        {/* drag handle */}\n        <div style={{ display: 'flex', justifyContent: 'center', padding: '10px 0 6px' }}>\n          <div style={{ width: 36, height: 5, borderRadius: 999, background: 'var(--vc-line)' }} />\n        </div>\n\n        {/* header */}\n        <div style={{ padding: '8px 18px 14px', display: 'flex', alignItems: 'center' }}>\n          <button onClick={onClose} className=\"btn-reset press\" style={{\n            color: 'var(--vc-ink-2)', fontWeight: 600, fontSize: 14,\n          }}>Cancel</button>\n          <div style={{ flex: 1, textAlign: 'center' }}>\n            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--vc-ink-2)' }}>Step {step} of 3</div>\n          </div>\n          <div style={{ width: 50 }} />\n        </div>\n\n        {/* progress */}\n        <div style={{ padding: '0 24px 16px', display: 'flex', alignItems: 'center', gap: 6 }}>\n          {[1, 2, 3].map(s => (\n            <React.Fragment key={s}>\n              <div style={{\n                width: 28, height: 28, borderRadius: 999,\n                background: step >= s ? 'var(--vc-red)' : 'var(--vc-bg-2)',\n                color: step >= s ? 'white' : 'var(--vc-ink-3)',\n                display: 'flex', alignItems: 'center', justifyContent: 'center',\n                fontWeight: 800, fontSize: 13, flexShrink: 0,\n              }}>\n                {step > s ? VCIcon.check('white', 14) : s}\n              </div>\n              {s < 3 && <div style={{ flex: 1, height: 3, borderRadius: 999, background: step > s ? 'var(--vc-red)' : 'var(--vc-bg-2)' }} />}\n            </React.Fragment>\n          ))}\n        </div>\n\n        {/* content */}\n        <div style={{ flex: 1, overflowY: 'auto', padding: '0 18px 100px' }}>\n          {step === 1 && (\n            <div className=\"screen-enter\">\n              <div className=\"display\" style={{ fontSize: 26, fontWeight: 800, letterSpacing: '-0.02em', marginBottom: 6 }}>\n                Create market\n              </div>\n              <div style={{ fontSize: 14, color: 'var(--vc-ink-2)', lineHeight: 1.45, marginBottom: 22 }}>\n                Open a market on any YouTube video. Multiple view-count tiers per deadline.\n              </div>\n\n              <div style={{ fontSize: 12, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>\n                YouTube video URL\n              </div>\n              <div className=\"card\" style={{ padding: 6, display: 'flex', gap: 6, alignItems: 'center' }}>\n                <div style={{ paddingLeft: 8, color: 'var(--vc-red)' }}>\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"3\"/><path d=\"M10 9l5 3-5 3V9z\" fill=\"white\"/></svg>\n                </div>\n                <input\n                  type=\"text\" value={url} onChange={e => setUrl(e.target.value)}\n                  placeholder=\"https://youtube.com/watch?v=\u2026\"\n                  style={{\n                    flex: 1, border: 0, outline: 0, fontSize: 14,\n                    fontFamily: 'inherit', background: 'transparent',\n                  }}\n                />\n                <button onClick={handleParse} className=\"btn-reset press\" style={{\n                  height: 38, padding: '0 16px', borderRadius: 12,\n                  background: url ? 'var(--vc-red)' : 'var(--vc-bg-2)',\n                  color: url ? 'white' : 'var(--vc-ink-3)',\n                  fontWeight: 700, fontSize: 13,\n                }}>Parse</button>\n              </div>\n              {urlError && (\n                <div style={{ marginTop: 8, fontSize: 12.5, color: 'var(--vc-danger)', fontWeight: 600 }}>\n                  {urlError}\n                </div>\n              )}\n\n              {/* Existing market found \u2014 bet directly instead of creating a duplicate */}\n              {existing && video && (\n                <div className=\"card\" style={{ marginTop: 16, padding: 14, border: '1.5px solid var(--vc-red)', borderRadius: 18 }}>\n                  <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, fontWeight: 800, color: 'var(--vc-red)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 10 }}>\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2.4\" strokeLinecap=\"round\" strokeLinejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M12 8v5\"/><path d=\"M12 16h.01\"/></svg>\n                    Market already exists\n                  </div>\n                  <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 12 }}>\n                    <div style={{ width: 96, height: 64, flexShrink: 0 }}>\n                      <VCThumb video={video} height={64} rounded={10} />\n                    </div>\n                    <div style={{ flex: 1, minWidth: 0 }}>\n                      <div style={{ fontSize: 13.5, fontWeight: 700, lineHeight: 1.3, marginBottom: 4 }}>{video.title}</div>\n                      <div className=\"tab-nums\" style={{ fontSize: 12, color: 'var(--vc-ink-2)' }}>\n                        {existing.tiers.length} tier{existing.tiers.length > 1 ? 's' : ''} \u00b7 ${vcFormatCoins(existing.vol)} vol\n                      </div>\n                    </div>\n                  </div>\n                  <div style={{ fontSize: 13, color: 'var(--vc-ink-2)', lineHeight: 1.45, marginBottom: 14 }}>\n                    This video already has a live market on ViewsCall. You can bet on it directly \u2014 no need to create a duplicate.\n                  </div>\n                  <button onClick={() => onOpenMarket && onOpenMarket(existing)} className=\"btn-reset press vc-btn-grad\" style={{\n                    width: '100%', height: 48, borderRadius: 999, background: 'var(--vc-red)',\n                    color: 'white', fontWeight: 700, fontSize: 15, marginBottom: 8,\n                  }}>Bet on this market</button>\n                  <div style={{ display: 'flex', gap: 10 }}>\n                    <button onClick={resetToUrl} className=\"btn-reset press\" style={{\n                      flex: 1, height: 42, borderRadius: 999, background: 'var(--vc-bg-2)',\n                      color: 'var(--vc-ink)', fontWeight: 700, fontSize: 13.5,\n                    }}>Try another link</button>\n                    <button onClick={createAnyway} className=\"btn-reset press\" style={{\n                      flex: 1, height: 42, borderRadius: 999, background: 'var(--vc-bg-2)',\n                      color: 'var(--vc-ink-2)', fontWeight: 700, fontSize: 13.5,\n                    }}>Create anyway</button>\n                  </div>\n                </div>\n              )}\n              <div style={{ marginTop: 12, fontSize: 11.5, color: 'var(--vc-ink-3)', lineHeight: 1.5 }}>\n                Demo note: this prototype picks a random video from the sample library on Parse.\n              </div>\n\n              {/* prefill examples */}\n              <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', margin: '24px 0 8px' }}>\n                Try a sample\n              </div>\n              {VC_VIDEOS.slice(0, 3).map(v => (\n                <button key={v.id} onClick={() => { setUrl(`https://youtube.com/watch?v=${v.id}`); setVideo(v); setUrlError(null); setTimeout(() => setStep(2), 250); }} className=\"btn-reset press card\" style={{\n                  width: '100%', padding: 10, marginBottom: 8, display: 'flex', gap: 10, alignItems: 'center', textAlign: 'left',\n                }}>\n                  <div style={{ width: 60, height: 44, flexShrink: 0 }}>\n                    <VCThumb video={v} height={44} rounded={8} />\n                  </div>\n                  <div style={{ flex: 1, minWidth: 0 }}>\n                    <div style={{ fontSize: 12.5, fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{v.title}</div>\n                    <div style={{ fontSize: 11, color: 'var(--vc-ink-2)' }} className=\"tab-nums\">{vcFormatViews(v.views)} views</div>\n                  </div>\n                </button>\n              ))}\n            </div>\n          )}\n\n          {step === 2 && video && (\n            <div className=\"screen-enter\">\n              <div className=\"display\" style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em', marginBottom: 14 }}>\n                Set deadline & tiers\n              </div>\n\n              {/* video preview */}\n              <div className=\"card\" style={{ padding: 12, marginBottom: 16 }}>\n                <div style={{ display: 'flex', gap: 12 }}>\n                  <div style={{ width: 96, height: 64, flexShrink: 0 }}>\n                    <VCThumb video={video} height={64} rounded={10} />\n                  </div>\n                  <div style={{ flex: 1, minWidth: 0 }}>\n                    <div style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.3, marginBottom: 4 }}>{video.title}</div>\n                    <div style={{ fontSize: 11.5, color: 'var(--vc-ink-2)' }}>{vcChannel(video.channel).name}</div>\n                    <div style={{ fontSize: 11.5, color: 'var(--vc-ink-2)' }} className=\"tab-nums\">\n                      {vcFormatViews(video.views)} \u00b7 {video.age}\n                    </div>\n                  </div>\n                </div>\n              </div>\n\n              {/* date */}\n              <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>\n                Resolution date\n              </div>\n              <div className=\"card\" style={{ padding: 14, marginBottom: 18, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n                <div>\n                  <div className=\"display\" style={{ fontSize: 22, fontWeight: 800 }}>Jun 15, 2026</div>\n                  <div style={{ fontSize: 12, color: 'var(--vc-ink-2)' }}>Resolves at 00:00 UTC</div>\n                </div>\n                <button className=\"btn-reset press\" style={{\n                  height: 36, padding: '0 14px', borderRadius: 12, background: 'var(--vc-bg-2)',\n                  fontWeight: 700, fontSize: 12.5,\n                }}>Change</button>\n              </div>\n\n              {/* tiers */}\n              <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8 }}>\n                <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>\n                  View-count tiers\n                </div>\n                <button disabled={tiers.length >= 5}\n                  onClick={() => { if (tiers.length < 5) setTiers([...tiers, { gt: tiers[tiers.length - 1].gt * 2 }]); }}\n                  className=\"btn-reset press\" style={{\n                  fontSize: 12.5, fontWeight: 700,\n                  color: tiers.length >= 5 ? 'var(--vc-ink-3)' : 'var(--vc-red)',\n                  display: 'inline-flex', alignItems: 'center', gap: 4,\n                  cursor: tiers.length >= 5 ? 'default' : 'pointer',\n                }}>\n                  {VCIcon.plus(tiers.length >= 5 ? 'var(--vc-ink-3)' : 'var(--vc-red)', 14)} Add tier\n                </button>\n              </div>\n\n              <div className=\"card\" style={{ padding: 6, marginBottom: 18 }}>\n                {tiers.map((t, i) => (\n                  <div key={i} style={{\n                    display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px',\n                    borderBottom: i < tiers.length - 1 ? '1px solid var(--vc-line-soft)' : 'none',\n                  }}>\n                    <span style={{\n                      width: 28, height: 28, borderRadius: 999, background: 'var(--vc-bg-2)',\n                      display: 'flex', alignItems: 'center', justifyContent: 'center',\n                      fontWeight: 800, fontSize: 12, color: 'var(--vc-ink-2)', flexShrink: 0,\n                    }}>{i + 1}</span>\n                    <span style={{ fontSize: 16, fontWeight: 800, color: 'var(--vc-ink-2)' }}>\u2265</span>\n                    <input\n                      type=\"text\"\n                      value={t.gt.toLocaleString()}\n                      onChange={e => {\n                        const n = Number(e.target.value.replace(/[^\\d]/g, ''));\n                        const nt = [...tiers]; nt[i].gt = n; setTiers(nt);\n                      }}\n                      style={{\n                        flex: 1, fontSize: 15, fontWeight: 700, border: 0, outline: 0,\n                        background: 'transparent', fontVariantNumeric: 'tabular-nums', minWidth: 0,\n                      }}\n                    />\n                    <span style={{ fontSize: 11.5, color: 'var(--vc-ink-2)', fontWeight: 600 }}>views</span>\n                    <button onClick={() => setTiers(tiers.filter((_, j) => j !== i))} className=\"btn-reset press\" style={{\n                      width: 30, height: 30, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center',\n                      color: 'var(--vc-ink-3)',\n                    }}>{VCIcon.trash('var(--vc-ink-3)', 16)}</button>\n                  </div>\n                ))}\n              </div>\n\n              <div style={{ fontSize: 12, color: 'var(--vc-ink-2)', lineHeight: 1.5 }}>\n                Tiers must be ascending and greater than current views ({vcFormatViews(video.views)}).\n              </div>\n            </div>\n          )}\n\n          {step === 3 && video && (\n            <div className=\"screen-enter\">\n              <div className=\"display\" style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em', marginBottom: 14 }}>\n                Confirm & publish\n              </div>\n\n              {/* preview card mimicking Explore card */}\n              <div className=\"card\" style={{ padding: 14, marginBottom: 18 }}>\n                <VCThumb video={video} height={150} rounded={12} />\n                <div style={{ padding: '10px 4px 4px' }}>\n                  <div style={{ fontWeight: 700, fontSize: 14, lineHeight: 1.3, marginBottom: 4 }}>{video.title}</div>\n                  <div style={{ fontSize: 11.5, color: 'var(--vc-ink-2)' }}>{vcChannel(video.channel).name}</div>\n                </div>\n                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 8 }}>\n                  {tiers.map((t, i) => (\n                    <VCTierRow key={i} tier={{ ...t, yes: 50 }} />\n                  ))}\n                </div>\n                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--vc-line-soft)' }}>\n                  <span style={{ fontSize: 12, color: 'var(--vc-ink-2)', fontWeight: 600 }}>Resolves Jun 15</span>\n                  <VCResolutionChip />\n                </div>\n              </div>\n\n              <div className=\"card\" style={{ padding: 14, marginBottom: 14 }}>\n                <div className=\"display\" style={{ fontSize: 14, fontWeight: 800, marginBottom: 10 }}>Rules</div>\n                <ul style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.55, color: 'var(--vc-ink-2)' }}>\n                  <li>Each tier resolves YES if view count is \u2265 that tier at 00:00 UTC on Jun 15, 2026.</li>\n                  <li>Resolution source: YouTube Data API v3 \u2014 <code style={{ background: 'var(--vc-bg)', padding: '1px 4px', borderRadius: 4, fontSize: 11 }}>videos.list</code> \u2192 <code style={{ background: 'var(--vc-bg)', padding: '1px 4px', borderRadius: 4, fontSize: 11 }}>statistics.viewCount</code>.</li>\n                  <li>Markets cannot be edited after publish.</li>\n                  <li>New markets start at 50/50 \u2014 odds move as predictors take sides.</li>\n                </ul>\n              </div>\n            </div>\n          )}\n        </div>\n\n        {/* sticky bottom action bar */}\n        <div style={{\n          padding: '12px 18px 24px',\n          background: 'var(--vc-bg)',\n          borderTop: '1px solid var(--vc-line-soft)',\n          display: 'flex', gap: 10,\n        }}>\n          {step > 1 && (\n            <button onClick={() => setStep(step - 1)} className=\"btn-reset press\" style={{\n              flex: 1, height: 48, borderRadius: 14, background: 'var(--vc-surface)',\n              fontWeight: 700, fontSize: 14, border: '1px solid var(--vc-line)',\n            }}>Back</button>\n          )}\n          {step < 3 && step > 1 && (\n            <button onClick={() => setStep(step + 1)} className=\"btn-reset press\" style={{\n              flex: 2, height: 48, borderRadius: 14, background: 'var(--vc-red)',\n              color: 'white', fontWeight: 700, fontSize: 14,\n              boxShadow: '0 4px 14px rgba(255,0,51,0.3)',\n            }}>Preview</button>\n          )}\n          {step === 3 && (\n            <button onClick={onPublish} className=\"btn-reset press\" style={{\n              flex: 2, height: 48, borderRadius: 14, background: 'var(--vc-red)',\n              color: 'white', fontWeight: 700, fontSize: 14,\n              boxShadow: '0 4px 14px rgba(255,0,51,0.3)',\n              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,\n            }}>\n              Publish market\n            </button>\n          )}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Search overlay \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCSearch({ onClose, onOpenTopic, onOpenMarket, onOpenUser }) {\n  const [q, setQ] = useState('');\n  const recent = ['MrBeast', 'STARCHO', 'F1 Monaco', 'PixelCrew worlds'];\n  const recommended = ['shorts', 'music', 'gaming', 'tech'];\n  const trending = VC_TRENDING_RANK;\n\n  return (\n    <div style={{\n      position: 'absolute', inset: 0, zIndex: 100,\n      background: 'var(--vc-bg)',\n      display: 'flex', flexDirection: 'column',\n    }}>\n      {/* top bar */}\n      <div style={{ padding: '14px 14px 10px', paddingTop: 'calc(env(safe-area-inset-top, 0px) + 14px)', display: 'flex', alignItems: 'center', gap: 8 }}>\n        <VCBackButton onClick={onClose} />\n        <div style={{\n          flex: 1, height: 44, borderRadius: 999, background: 'var(--vc-surface)',\n          padding: '0 14px', display: 'flex', alignItems: 'center', gap: 10,\n          boxShadow: '0 1px 2px rgba(0,0,0,0.04), 0 0 0 2.5px var(--vc-red-soft)',\n        }}>\n          {VCIcon.search('var(--vc-ink-2)', 18)}\n          <input\n            autoFocus value={q} onChange={e => setQ(e.target.value)}\n            placeholder=\"Search videos, users, topics\"\n            style={{\n              flex: 1, border: 0, outline: 0, background: 'transparent',\n              fontSize: 14, fontFamily: 'inherit',\n            }}\n          />\n          {q && (\n            <button onClick={() => setQ('')} className=\"btn-reset\" style={{\n              width: 22, height: 22, borderRadius: 999, background: 'var(--vc-bg-2)',\n              display: 'flex', alignItems: 'center', justifyContent: 'center',\n              color: 'var(--vc-ink-2)',\n            }}>{VCIcon.close('var(--vc-ink-2)', 12)}</button>\n          )}\n        </div>\n      </div>\n\n      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 14px 30px' }}>\n        {q ? (\n          // typing results \u2014 real prefix filtering on the query\n          (() => {\n          const qq = q.trim().toLowerCase();\n          const starts = (s) => (s || '').toLowerCase().startsWith(qq);\n          const vids = VC_EXPLORE_MARKETS.filter(mm => starts(vcVideo(mm.video).title));\n          const users = Object.keys(VC_USERS).filter(uid => starts(vcUser(uid).name));\n          const topics = VC_TOPIC_LIST.filter(t => starts(t.label));\n          const empty = vids.length === 0 && users.length === 0 && topics.length === 0;\n          return (\n          <div className=\"screen-enter\">\n            {vids.length > 0 && <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', padding: '8px 6px' }}>Videos</div>}\n            {vids.map(m => {\n              const v = vcVideo(m.video);\n              const ch = vcChannel(v.channel);\n              return (\n                <div key={m.id} className=\"card press\"\n                  onClick={() => { onClose(); onOpenMarket && onOpenMarket(m); }}\n                  style={{ padding: 10, marginBottom: 8, display: 'flex', gap: 10, alignItems: 'center', cursor: 'pointer' }}>\n                  <div style={{ width: 70, height: 50, flexShrink: 0 }}><VCThumb video={v} height={50} rounded={8}/></div>\n                  <div style={{ flex: 1, minWidth: 0 }}>\n                    <div style={{ fontWeight: 700, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{v.title}</div>\n                    <div style={{ fontSize: 11, color: 'var(--vc-ink-2)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>\n                      {ch.name} \u00b7 <span className=\"tab-nums\">{vcFormatViews(v.views)} views</span> \u00b7 {v.age || 'just now'}\n                    </div>\n                  </div>\n                </div>\n              );\n            })}\n\n            {users.length > 0 && <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', padding: '14px 6px 8px' }}>Users</div>}\n            {users.map(uid => {\n              const u = vcUser(uid);\n              return (\n                <div key={uid} className=\"card press\" onClick={() => { onClose(); onOpenUser && onOpenUser(uid); }} role=\"button\" tabIndex={0} style={{ padding: 10, marginBottom: 8, display: 'flex', gap: 10, alignItems: 'center', cursor: 'pointer' }}>\n                  <VCAvatar user={u} size={38} />\n                  <div style={{ flex: 1, minWidth: 0 }}>\n                    <div style={{ fontWeight: 700, fontSize: 13 }}>{u.name}</div>\n                    <div style={{ fontSize: 11, color: 'var(--vc-ink-2)' }}>@{u.handle}</div>\n                  </div>\n                </div>\n              );\n            })}\n\n            {topics.length > 0 && <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', padding: '14px 6px 8px' }}>Topics</div>}\n            {topics.length > 0 && <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, padding: '0 4px 4px' }}>\n              {topics.map(t => (\n                <VCTopicChip key={t.id} topic={t} size=\"m\" onClick={() => onOpenTopic && onOpenTopic(t.id)} />\n              ))}\n            </div>}\n            {empty && <div style={{ textAlign: 'center', color: 'var(--vc-ink-3)', fontSize: 13, padding: '28px 6px' }}>No results for \"{q}\"</div>}\n\n            <button className=\"btn-reset press\" style={{\n              width: '100%', padding: 14, marginTop: 8, borderRadius: 14,\n              background: 'var(--vc-bg-2)', fontWeight: 700, fontSize: 13.5, color: 'var(--vc-ink-2)',\n            }}>See all results for \"{q}\"</button>\n          </div>\n          );\n          })()\n        ) : (\n          <div>\n            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', padding: '12px 6px 8px' }}>\n              <span style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Recent</span>\n              <button className=\"btn-reset\" style={{ fontSize: 12, fontWeight: 600, color: 'var(--vc-ink-2)' }}>Clear</button>\n            </div>\n            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 18 }}>\n              {recent.map(r => (\n                <button key={r} className=\"btn-reset press\" style={{\n                  height: 32, padding: '0 12px', borderRadius: 999, background: 'var(--vc-surface)',\n                  fontSize: 12.5, fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 6,\n                  boxShadow: '0 1px 2px rgba(0,0,0,0.04)',\n                }}>\n                  <span style={{ color: 'var(--vc-ink-3)' }}>\u21ba</span>\n                  {r}\n                </button>\n              ))}\n            </div>\n\n            <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', padding: '0 6px 10px' }}>\n              Recommended for you\n            </div>\n            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 18 }}>\n              {recommended.map(id => {\n                const t = VC_TOPIC_LIST.find(x => x.id === id);\n                return (\n                  <button key={id} onClick={() => onOpenTopic(id)} className=\"btn-reset card press\" style={{\n                    padding: 14, display: 'flex', alignItems: 'center', gap: 10, textAlign: 'left',\n                  }}>\n                    <div style={{ width: 40, height: 40, borderRadius: 12, background: 'var(--vc-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>{t.emoji}</div>\n                    <div>\n                      <div style={{ fontWeight: 700, fontSize: 14 }}>{t.label}</div>\n                      <div style={{ fontSize: 11, color: 'var(--vc-ink-2)' }} className=\"tab-nums\">+{(() => { let h = 0; for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0; return 2 + (Math.abs(h) % 14); })()}k predictions today</div>\n                    </div>\n                  </button>\n                );\n              })}\n            </div>\n\n            <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', padding: '0 6px 10px' }}>\n              Trending now \ud83d\udd25\n            </div>\n            {trending.map((tr, i) => {\n              const t = VC_TOPIC_LIST.find(x => x.id === tr.id);\n              return (\n                <button key={tr.id} onClick={() => onOpenTopic(tr.id)} className=\"btn-reset press\" style={{\n                  width: '100%', padding: '12px 14px', marginBottom: 6, borderRadius: 14, background: 'var(--vc-surface)',\n                  display: 'flex', alignItems: 'center', gap: 12, boxShadow: '0 1px 2px rgba(0,0,0,0.04)', textAlign: 'left',\n                }}>\n                  <span className=\"tab-nums display\" style={{ width: 22, fontSize: 14, fontWeight: 800, color: 'var(--vc-ink-3)' }}>{i + 1}</span>\n                  <span style={{ fontSize: 20 }}>{t.emoji}</span>\n                  <div style={{ flex: 1 }}>\n                    <div style={{ fontWeight: 700, fontSize: 14 }}>{t.label}</div>\n                    <div style={{ fontSize: 11, color: 'var(--vc-ink-2)' }} className=\"tab-nums\">{tr.count}k predictions</div>\n                  </div>\n                </button>\n              );\n            })}\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Notifications \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCNotifications({ onClose, read = false, onMarkAllRead, onManagePrefs, onOpenUser }) {\n  const [tab, setTab] = useState('All');\n  // Categorize each notification: trading = predictions/markets/streaks; social = people/replies.\n  const TRADING_TYPES = ['resolved', 'resolved2', 'beat'];\n  const SOCIAL_TYPES = ['follower', 'follower2', 'reply'];\n  const catOf = (n) => SOCIAL_TYPES.includes(n.type) ? 'Social' : 'Trading';\n  const filtered = tab === 'All' ? VC_NOTIFS : VC_NOTIFS.filter((n) => catOf(n) === tab);\n\n  return (\n    <div style={{\n      position: 'absolute', inset: 0, zIndex: 100,\n      background: 'var(--vc-bg)',\n      display: 'flex', flexDirection: 'column',\n    }}>\n      <div style={{ padding: '14px 14px 12px', paddingTop: 'calc(env(safe-area-inset-top, 0px) + 14px)', display: 'flex', alignItems: 'center', gap: 12 }}>\n        <VCBackButton onClick={onClose} />\n        <div className=\"display\" style={{ flex: 1, fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em' }}>Notifications</div>\n        <button onClick={() => onMarkAllRead && onMarkAllRead()} className=\"btn-reset press\" style={{ fontSize: 12.5, fontWeight: 700, color: read ? 'var(--vc-ink-3)' : 'var(--vc-ink-2)' }}>Mark all read</button>\n      </div>\n\n      <div style={{ padding: '0 14px 12px', display: 'flex', justifyContent: 'center' }}>\n        <VCSegmented value={tab} onC ateMarket, VCSearch, VCNotifications, VCShareSheet, VCPublishSuccess });\n\n\n// ===== 1cd1325d-4b26-4749-8d0c-13d376600ca2.js =====\n// ViewsCall \u2014 main app shell\n\nconst VC_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"theme\": \"cream\",\n  \"accent\": \"#FF0033\",\n  \"density\": \"balanced\",\n  \"emoji\": true,\n  \"showVolume\": true\n}/*EDITMODE-END*/;\n\nfunction VCApp({ tweaks }) {\n  const [tab, setTab] = useState('home');\n  const [stack, setStack] = useState([]); // nav stack on top of current tab\n  const [homeKey, setHomeKey] = useState(0); // bump to reset Home to For-you on logo tap\n  const [overlay, setOverlay] = useState(null); // 'create' | 'search' | 'notif' | 'share' | 'comments' | null\n  const [sharePost, setSharePost] = useState(null);\n  const [commentsPost, setCommentsPost] = useState(null);\n  const [notifRead, setNotifRead] = useState(false);\n  const [showPublishSuccess, setShowPublishSuccess] = useState(false);\n  const [, setYtTick] = useState(0);\n  useEffect(() => {\n    if (window.vcFetchYouTube) { window.vcFetchYouTube().then(() => setYtTick(t => t + 1)); }\n  }, []);\n  // \u2500\u2500 Pull-to-refresh (app-shell level so the indicator sits above the\n  // top header, and header+sub-header+feed translate together) \u2500\u2500\n  const [ptrPull, setPtrPull] = useState(0);\n  const [ptrState, setPtrState] = useState('idle');\n  const ptrStartY = useRef(null);\n  const ptrPullRef = useRef(0);\n  const ptrActiveRef = useRef(false);\n\n  // theme application\n  useEffect(() => {\n    const root = document.documentElement;\n    const themes = {\n      cream: { bg: '#FAF6EC', bg2: '#F4EFE1', surface: '#FFFFFF', ink: '#0F0F0F', ink2: '#6B6B6B', ink3: '#A0A0A0', line: '#ECE6D8', linesoft: '#F2EDDF', boost: '#ECE4D2' },\n      white: { bg: '#FFFFFF', bg2: '#F4F4F2', surface: '#FFFFFF', ink: '#0F0F0F', ink2: '#606060', ink3: '#A0A0A0', line: '#E5E5E5', linesoft: '#EFEFEF', boost: '#F2F2F0' },\n      dark:  { bg: '#161310', bg2: '#221E18', surface: '#1F1B16', ink: '#F8F4EA', ink2: '#A39E92', ink3: '#7A746A', line: '#2B271F', linesoft: '#231F19', boost: '#0F0D0A' },\n    };\n    const th = themes[tweaks.theme] || themes.cream;\n    root.style.setProperty('--vc-bg', th.bg);\n    root.style.setProperty('--vc-bg-2', th.bg2);\n    root.style.setProperty('--vc-surface', th.surface);\n    root.style.setProperty('--vc-ink', th.ink);\n    root.style.setProperty('--vc-ink-2', th.ink2);\n    root.style.setProperty('--vc-ink-3', th.ink3);\n    root.style.setProperty('--vc-line', th.line);\n    root.style.setProperty('--vc-line-soft', th.linesoft);\n    root.style.setProperty('--vc-red', tweaks.accent || '#FF0033');\n    document.body.style.background =\n      tweaks.theme === 'dark'\n        ? `radial-gradient(1000px 600px at 70% 10%, rgba(255,0,51,0.08), transparent 60%), ${th.boost}`\n        : `radial-gradient(1200px 600px at 70% 10%, rgba(255,0,51,0.06), transparent 60%), radial-gradient(1000px 500px at 10% 90%, rgba(255,140,0,0.05), transparent 60%), ${th.boost}`;\n  }, [tweaks.theme, tweaks.accent]);\n\n  // tab change resets stack\n  const goTab = (id) => {\n    setTab(id);\n    setStack([]);\n  };\n\n  // Logo tap: jump to Home \u2192 For you from anywhere (clear stack/overlay, reset sub-tab + scroll).\n  const goHome = () => {\n    setTab('home');\n    setStack([]);\n    setOverlay(null);\n    setHomeKey((k) => k + 1);\n  };\n\n  const push = (screen) => setStack([...stack, screen]);\n  const pop = () => setStack(stack.slice(0, -1));\n\n  const current = stack[stack.length - 1];\n\n  // render current screen\n  let screen = null;\n  if (current) {\n    if (current.type === 'post') screen = <VCPostDetail post={current.post} onBack={pop} onOpenUser={(uid) => push({ type: 'user', userId: uid })} />;\n    else if (current.type === 'user') screen = <VCUserProfile userId={current.userId} onBack={() => { if (current.returnOverlay) setOverlay(current.returnOverlay); pop(); }} onOpenUser={(uid) => push({ type: 'user', userId: uid })}\n      onOpenPost={(p) => push({ type: 'post', post: p })}\n      onShare={(p) => { setSharePost(p); setOverlay('share'); }}\n      onOpenComments={(p) => { setCommentsPost(p); setOverlay('comments'); }}\n      onOpenMarket={(m, tier) => push({ type: 'market', market: m, tier })} />;\n    else if (current.type === 'trending') screen = <VCTrendingPage onBack={pop} onOpenTopic={(id) => push({ type: 'topic', id })} />;\n    else if (current.type === 'topic') screen = <VCTopicPage topicId={current.id} onBack={pop} onOpenMarket={(m, tier) => push({ type: 'market', market: m, tier })} />;\n    else if (current.type === 'market') screen = <VCMarketDetail market={current.market} initialTier={current.tier} onBack={pop} onShare={() => { setSharePost(VC_FEED[0]); setOverlay('share'); }} />;\n    else if (current.type === 'settings') screen = <VCSettings onBack={pop} onSignOut={pop} onInvite={() => push({ type: 'referral' })} onNotifications={() => push({ type: 'notifsettings' })} onAccountSec={() => push({ type: 'accountsec' })} />;\n    else if (current.type === 'notifsettings') screen = <VCNotifSettings onBack={pop} />;\n    else if (current.type === 'accountsec') screen = <VCAccountSecurity onBack={pop} />;\n    else if (current.type === 'follows') screen = <VCFollows initialTab={current.initialTab} onBack={pop} onOpenUser={(uid) => push({ type: 'user', userId: uid })} />;\n    else if (current.type === 'topCallers') screen = <VCTopCallers onBack={pop} />;\n    else if (current.type === 'viewall') screen = <VCViewAll initialTab={current.initialTab} onBack={pop} onExplore={() => { pop(); goTab('home'); }} />;\n    else if (current.type === 'referral') screen = <VCReferral onBack={pop} />;\n    else if (current.type === 'editprofile') screen = <VCEditProfile onBack={pop} />;\n  } else {\n    if (tab === 'home') screen = <VCHome key={homeKey} tweaks={tweaks}\n      onOpenUser={(uid) => push({ type: 'user', userId: uid })}\n      onOpenPost={(p) => push({ type: 'post', post: p })}\n      onShare={(p) => { setSharePost(p); setOverlay('share'); }}\n      onOpenComments={(p) => { setCommentsPost(p); setOverlay('comments'); }}\n      onOpenTopCallers={() => goTab('leaderboard')}\n      onOpenSearch={() => setOverlay('search')}\n      onOpenMarket={(market, tier) => push({ type: 'market', market, tier })}\n      onCompose={() => setOverlay('compose')}\n    />;\n    else if (tab === 'explore') screen = <VCExplore onOpenTopic={(id) => push({ type: 'topic', id })} onOpenMarket={(m, tier) => push({ type: 'market', market: m, tier })} onSearch={() => setOverlay('search')} onOpenTrending={() => push({ type: 'trending' })} />;\n    else if (tab === 'leaderboard') screen = <VCLeaderboard onOpenUser={(uid) => push({ type: 'user', userId: uid })} />;\n    else if (tab === 'me') screen = <VCProfile onOpenSettings={() => push({ type: 'settings' })} onOpenFollows={(t) => push({ type: 'follows', initialTab: t })} onOpenPost={() => goTab('home')} onViewAll={(t) => push({ type: 'viewall', initialTab: t })} onOpenRewards={() => push({ type: 'referral' })} onEditProfile={() => push({ type: 'editprofile' })} />;\n  }\n\n  const showTopBar = !current || (current.type !== 'post' && current.type !== 'topic' && current.type !== 'market' && current.type !== 'settings' && current.type !== 'follows' && current.type !== 'topCallers' && current.type !== 'viewall' && current.type !== 'referral' && current.type !== 'editprofile' && current.type !== 'notifsettings' && current.type !== 'accountsec');\n\n  // Scroll the content area back to top whenever the active screen changes\n  // so a fresh page (especially the SKU/market detail) renders from its top\n  // and its slide-down animation reads correctly.\n  const scrollRef = useRef(null);\n  // Include enough identity in the key so navigating between markets / posts\n  // remounts the screen and re-fires its enter animation.\n  const screenKey = current\n    ? `${current.type}:${stack.length}:${(curr

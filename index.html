: 'center',\n              boxShadow: '0 4px 12px rgba(255,0,51,0.3)', flexShrink: 0,\n              opacity: composerText.trim() ? 1 : 0.55\n            }}>\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" strokeWidth=\"2.6\" strokeLinecap=\"round\" strokeLinejoin=\"round\"><path d=\"M12 19V5\" /><path d=\"M5 12l7-7 7 7\" /></svg>\n          </button>\n        </div>\n\n        {/* native iOS keyboard handles input \u2014 no fake keyboard widget */}\n        <div style={{ height: 14 }} />\n      </div>\n    </div>);\n\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Prediction post card \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCFeedCard({ post, onOpen, onShare, onOpenComments, onOpenMarket, isFollowing = false, onToggleFollow, onOpenUser }) {\n  const u = vcUser(post.user);\n  const v = vcVideo(post.video);\n  const ch = vcChannel(v.channel);\n  const m = post.market;\n  const [videoPlaying, setVideoPlaying] = useState(false);\n\n  // Position math: poster bet `post.side` at `post.entry`%, market is now at `current`%.\n  // `current` ticks live every second with a small random walk so the % and the\n  // dependent ROI ($ and %) move in real time. Entry stays fixed.\n  const isYes = post.side === 'YES';\n  const entry = post.entry;\n  // Live market %: random-walks at a random 1\u20135s cadence (per-card independent).\n  const current = useLiveValue(m.yes, { min: 1, max: 99, amp: 2, decimals: 1 });\n  // ROI recomputed from the live `current` \u2014 both $ and % follow it.\n  const { profit, roiPct, value } = vcPositionROI(post.side, entry, current, post.stake);\n\n  // Arrow tracks probability MOVEMENT only \u2014 green if % went up, red if it went down.\n  // Independent of bet side or P/L direction.\n  const probUp = current >= entry;\n  const arrowColor = probUp ? 'var(--vc-success)' : 'var(--vc-danger)';\n\n  // Pill colors per side (soft tint)\n  const pillBg = isYes ? 'rgba(22,163,74,0.12)' : 'rgba(217,48,37,0.12)';\n  const pillText = isYes ? 'var(--vc-success)' : 'var(--vc-danger)';\n  const sideLabel = isYes ? 'Yes' : 'No';\n\n  // Arrow direction: up-right if probability rose, down-right if it fell\n  const Arrow = ({ color, up }) =>\n  <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke={color} strokeWidth=\"2.6\" strokeLinecap=\"round\" strokeLinejoin=\"round\" style={{ flexShrink: 0 }}>\n      {up ?\n    <React.Fragment><path d=\"M7 17L17 7\" /><path d=\"M9 7h8v8\" /></React.Fragment> :\n    <React.Fragment><path d=\"M7 7l10 10\" /><path d=\"M17 9v8H9\" /></React.Fragment>}\n    </svg>;\n\n\n  const fmt$ = (n) => {\n    const abs = Math.abs(n);\n    if (abs >= 1000) return (n < 0 ? '-' : '') + '$' + (abs / 1000).toFixed(2) + 'k';\n    return (n < 0 ? '-' : '') + '$' + abs.toFixed(2);\n  };\n\n  return (\n    <div className=\"card\" style={{ padding: 16, marginBottom: 14, position: 'relative' }}>\n      {/* header (no overflow-menu icon) \u2014 items aligned to top */}\n      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>\n        <div onClick={(e) => { e.stopPropagation(); onOpenUser && onOpenUser(post.user); }} style={{ cursor: 'pointer', flexShrink: 0 }}>\n          <VCAvatar user={u} size={40} />\n        </div>\n        <div style={{ flex: 1, minWidth: 0 }}>\n          <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>\n            <span onClick={(e) => { e.stopPropagation(); onOpenUser && onOpenUser(post.user); }} style={{ fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>{u.name}</span>\n            <span style={{ color: 'var(--vc-ink-3)', fontSize: 13 }}>\u00b7 {post.time}</span>\n          </div>\n          <div style={{\n            color: 'var(--vc-ink-2)', fontSize: 12,\n            display: 'flex', alignItems: 'center', gap: 5,\n            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', minWidth: 0\n          }}>\n            <span>@{u.handle}</span>\n            {u.x && vcHasXHandle(post.user) &&\n            <React.Fragment>\n                <a href=\"https://x.com/icebean10\" target=\"_blank\" rel=\"noopener noreferrer\" onClick={(e) => e.stopPropagation()}\n                  style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0, textDecoration: 'none' }}>\n                  <span style={{ width: 17, height: 17, borderRadius: 5, background: '#000', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>\n                    <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z\"/></svg>\n                  </span>\n                </a>\n              </React.Fragment>\n            }\n          </div>\n        </div>\n        <VCFollowButton following={isFollowing} height={30}\n          onClick={(e) => { e.stopPropagation(); onToggleFollow && onToggleFollow(post.user); }} />\n      </div>\n\n      {/* body text */}\n      <VCPostBody text={post.body} />\n\n      {/* video \u2014 tap toggles play state in-place. Only the play button shows/hides;\n             the thumbnail image and the channel/stats row stay static (no press scale). */}\n      <div\n        onClick={(e) => {e.stopPropagation();setVideoPlaying((p) => !p);}}\n        style={{ marginBottom: 12, cursor: 'pointer' }}>\n        <VCThumb video={v} height={194} rounded={14} hidePlay={videoPlaying} playing={videoPlaying} />\n        <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 8, fontSize: 12.5, flexWrap: 'nowrap', minWidth: 0 }}>\n          {v.channelAvatar\n            ? <img src={v.channelAvatar} alt=\"\" style={{ width: 18, height: 18, borderRadius: '50%', objectFit: 'cover', flexShrink: 0 }} />\n            : <div style={{\n                width: 18, height: 18, borderRadius: '50%',\n                background: 'var(--vc-no)', color: 'white', display: 'flex',\n                alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 9, flexShrink: 0\n              }}>{(v.channelName || ch.name)[0]}</div>}\n          <span style={{ display: 'inline-flex', alignItems: 'baseline', columnGap: 7, flexWrap: 'wrap', flexShrink: 1, minWidth: 0, marginRight: 'auto' }}>\n            <span style={{ fontWeight: 600 }}>{v.channelName || ch.name}</span>\n            <span style={{ color: 'var(--vc-ink-2)', whiteSpace: 'nowrap' }}>{v.views ? `${vcFormatViews(v.views)} views \u00b7 ${v.age}` : '\u2026'}</span>\n          </span>\n          {/* \"YouTube \u2197\" deep-link to the source video, grey */}\n          <a\n            href={`https://www.youtube.com/watch?v=${v.yt || v.id}`}\n            target=\"_blank\"\n            rel=\"noopener noreferrer\"\n            onClick={(e) => e.stopPropagation()}\n            style={{\n              marginLeft: 'auto',\n              display: 'inline-flex', alignItems: 'center', gap: 3,\n              color: 'var(--vc-ink-2)', fontWeight: 600, textDecoration: 'none',\n              flexShrink: 0\n            }}>\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"4\" fill=\"#FF0000\"/><path d=\"M10 9l5 3-5 3z\" fill=\"#fff\"/></svg>\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2.2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" aria-hidden=\"true\">\n              <path d=\"M7 17L17 7\" />\n              <path d=\"M9 7h8v8\" />\n            </svg>\n          </a>\n        </div>\n      </div>\n\n      {/* POSITION STATUS \u2014 flush with video edges, no inner background */}\n      <div\n        onClick={(e) => {\n          e.stopPropagation();\n          // Find a matching curated market for this video, or build one from the\n          // post's market state. When building, generate 2\u20135 tiers (deterministic\n          // per post id) around the post's milestone \u2014 ascending view targets with\n          // descending YES% \u2014 so the market page isn't a single lonely tier.\n          const matched = VC_EXPLORE_MARKETS.find((em) => em.video === post.video);\n          let market = matched;\n          if (!market) {\n            let h = 0;\n            for (let i = 0; i < post.id.length; i++) h = (h * 31 + post.id.charCodeAt(i)) | 0;\n            const rnd = (n) => Math.abs((h = (h * 1103515245 + 12345) | 0)) % n;\n            const count = 2 + rnd(4); // 2\u20135 tiers\n            const baseIdx = rnd(count); // which tier the post itself sits on\n            const tiers = [];\n            for (let i = 0; i < count; i++) {\n              const step = i - baseIdx;\n              // scale threshold by ~1.6x per step away from the post's tier\n              const gt = Math.max(1, Math.round(m.tier * Math.pow(1.6, step)));\n              // YES% drops as the target rises; clamp to 5\u201396\n              const yes = Math.max(5, Math.min(96, Math.round(m.yes - step * (10 + rnd(8)))));\n              tiers.push({ gt, yes });\n            }\n            market = {\n              id: 'm_' + post.id, video: post.video,\n              tiers,\n              deadline: m.deadline.replace('Resolves in ', '').replace('Resolves ', ''),\n              vol: m.vol\n            };\n          }\n          onOpenMarket && onOpenMarket(market);\n        }}\n        className=\"press\"\n        style={{\n          padding: '14px 16px 12px',\n          marginLeft: -16, marginRight: -16,\n          marginBottom: 4,\n          borderTop: '1px dashed var(--vc-line)',\n          cursor: 'pointer'\n        }}>\n        {/* question */}\n        <div style={{ fontSize: 14.5, fontWeight: 700, lineHeight: 1.35, marginBottom: 12 }}>\n          {m.question}\n        </div>\n\n        {/* line 1: side pill + stake */}\n        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>\n          <div style={{\n            display: 'inline-flex', alignItems: 'center',\n            padding: '5px 11px', borderRadius: 10,\n            background: pillBg, color: pillText,\n            fontWeight: 800, fontSize: 13.5\n          }}>\n            <span>{sideLabel}&nbsp;</span>\n            <span className=\"tab-nums\">{entry}%</span>\n          </div>\n          <div className=\"display tab-nums\" style={{ fontSize: 20, fontWeight: 800, letterSpacing: '-0.02em' }}>\n            ${post.stake.toLocaleString()}\n          </div>\n        </div>\n\n        {/* line 2: entry \u2192 current + ROI */}\n        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13.5, fontWeight: 600, color: 'var(--vc-ink-2)' }}>\n            <span className=\"tab-nums\">{entry}%</span>\n            <Arrow color={arrowColor} up={probUp} />\n            <span className=\"tab-nums\" style={{ color: 'var(--vc-ink)', fontWeight: 700 }}><VCLiveNumber value={current} format={(v) => v.toFixed(1) + '%'} /></span>\n          </div>\n          <div className=\"tab-nums\" style={{\n            fontSize: 13.5, fontWeight: 800,\n            color: profit >= 0 ? 'var(--vc-success)' : 'var(--vc-danger)'\n          }}>\n            <VCLiveNumber value={current} format={() => (profit >= 0 ? '+' : '') + fmt$(profit)} /> <span style={{ fontWeight: 700 }}>(<VCLiveNumber value={current} format={() => (profit >= 0 ? '+' : '') + roiPct.toFixed(2) + '%'} />)</span>\n          </div>\n        </div>\n      </div>\n\n      {/* Comments preview \u2014 replaces like/RT/share/timer row.\n            Shows one top comment (by likes) with an Instagram-style preview;\n            tapping opens the full reels-style comments sheet. */}\n      {(() => {\n        const top = vcTopComment(post.id);\n        if (!top) return null;\n        const cu = vcUser(top.u);\n        const _vt = v && v.title && v.title !== 'YouTube video' ? v.title : null;\n        const _short = _vt && _vt.length > 46 ? _vt.slice(0, 44).trim() + '\\u2026' : _vt;\n        const _tmpl = _short ? [\n          `\\u201c${_short}\\u201d is going to overperform, calling it now`,\n          `the algo is going to love \\u201c${_short}\\u201d`,\n          `\\u201c${_short}\\u201d \\u2014 thumbnail alone is worth the YES`,\n          `watched \\u201c${_short}\\u201d twice already, this hits the tier easy`,\n        ] : null;\n        const _body = _tmpl ? _tmpl[(post.id.charCodeAt(post.id.length-1)) % _tmpl.length] : top.body;\n        return (\n          <button\n            onClick={(e) => {e.stopPropagation();onOpenComments && onOpenComments(post);}}\n            className=\"btn-reset press\"\n            style={{\n              width: 'calc(100% + 32px)',\n              display: 'flex', alignItems: 'center', gap: 10,\n              padding: '12px 16px 4px',\n              marginLeft: -16, marginRight: -16,\n              borderTop: '1px dashed var(--vc-line)',\n              textAlign: 'left'\n            }}>\n            <VCAvatar user={cu} size={28} />\n            <div style={{\n              flex: 1, minWidth: 0, fontSize: 13, lineHeight: 1.35,\n              overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'\n            }}>\n              <span style={{ fontWeight: 700 }}>{cu.name}</span>{' '}\n              <span style={{ color: 'var(--vc-ink-2)' }}>{_body}</span>\n            </div>\n            <div style={{\n              flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 5,\n              color: 'var(--vc-ink-2)'\n            }}>\n              {VCIcon.bubble('var(--vc-ink-2)', 16)}\n              <span className=\"tab-nums\" style={{ fontSize: 11.5, fontWeight: 700 }}>\n                {post.comments}\n              </span>\n            </div>\n          </button>);\n\n      })()}\n    </div>);\n\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Home screen \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCHome({ tweaks, onOpenPost, onShare, onOpenComments, onOpenTopCallers, onOpenSearch, onOpenMarket, onCompose, onOpenUser }) {\n  const chromeHidden = useVCChrome();\n  const [seg, setSeg] = useState('foryou');\n  // Followed-user IDs from the Suggested list. When at least one user is\n  // followed, the Following feed renders their posts instead of the empty state.\n  const [follows, setFollows] = useState({});\n  const followedIds = Object.keys(follows).filter((k) => follows[k]);\n  const toggleFollow = (uid) => setFollows((prev) => ({ ...prev, [uid]: !prev[uid] }));\n  // Posts authored by followed users, in feed order.\n  const followingFeed = VC_FEED.filter((p) => follows[p.user]);\n  const tabs = [\n  { id: 'foryou', label: 'For you' },\n  { id: 'following', label: 'Following' }];\n\n\n  // Measure each tab's text width so the red underline matches the text only.\n  const tabRefs = useRef({});\n  const textRefs = useRef({});\n  const [indicator, setIndicator] = useState({ left: 0, width: 0 });\n\n  useEffect(() => {\n    const measure = () => {\n      const tEl = tabRefs.current[seg];\n      const txEl = textRefs.current[seg];\n      if (!tEl || !txEl) return;\n      const tRect = tEl.getBoundingClientRect();\n      const xRect = txEl.getBoundingClientRect();\n      setIndicator({\n        left: xRect.left - tRect.left + tEl.offsetLeft,\n        width: xRect.width\n      });\n    };\n    measure();\n    window.addEventListener('resize', measure);\n    return () => window.removeEventListener('resize', measure);\n  }, [seg]);\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      {/* X-style sub-header tabs \u2014 locked to top bar */}\n      <div style={{\n        position: 'sticky',\n        top: 56,\n        zIndex: 19,\n        display: 'flex',\n        margin: '0 0 4px',\n        borderBottom: '1px solid var(--vc-line)',\n        background: 'var(--vc-bg)',\n        transform: chromeHidden ? 'translateY(calc(-100% - 56px))' : 'translateY(0)',\n        transition: 'transform 0.24s cubic-bezier(0.2, 0.8, 0.2, 1)',\n        willChange: 'transform'\n      }}>\n        {tabs.map((t) => {\n          const active = seg === t.id;\n          return (\n            <button\n              key={t.id}\n              ref={(el) => {tabRefs.current[t.id] = el;}}\n              onClick={() => setSeg(t.id)}\n              className=\"btn-reset press\"\n              style={{\n                flex: 1,\n                padding: '15px 0',\n                display: 'flex', alignItems: 'center', justifyContent: 'center'\n              }}>\n              <span\n                ref={(el) => {textRefs.current[t.id] = el;}}\n                style={{\n                  fontSize: 15,\n                  fontWeight: active ? 700 : 500,\n                  color: active ? 'var(--vc-ink)' : 'var(--vc-ink-2)',\n                  transition: 'color 220ms ease-in-out, font-weight 220ms ease-in-out',\n                  letterSpacing: '-0.005em'\n                }}>{t.label}</span>\n            </button>);\n\n        })}\n        {/* sliding red underline \u2014 width matches just the text */}\n        <div style={{\n          position: 'absolute',\n          bottom: 0,\n          left: indicator.left,\n          width: indicator.width,\n          height: 3.5,\n          background: 'var(--vc-red)',\n          borderRadius: 2,\n          transition: 'left 230ms ease-in-out, width 230ms ease-in-out',\n          pointerEvents: 'none'\n        }} />\n      </div>\n\n      {seg === 'foryou' ?\n      <div style={{ padding: '0 14px' }}>\n          {((window.__vcOrder && window.__vcOrder.feed) || VC_FEED).map((p) =>\n        <VCFeedCard key={p.id} post={p}\n        onOpen={() => onOpenPost(p)}\n        onShare={() => onShare(p)}\n        onOpenComments={onOpenComments}\n        onOpenMarket={onOpenMarket}\n        onOpenUser={onOpenUser}\n        isFollowing={!!follows[p.user]}\n        onToggleFollow={toggleFollow} />\n\n        )}\n        </div> :\n      followingFeed.length > 0 ?\n      // Following \u2014 at least one user is followed; show their posts only.\n      <div style={{ padding: '0 14px' }}>\n          <div style={{\n          padding: '2px 6px 12px',\n          fontSize: 11.5, color: 'var(--vc-ink-2)', fontWeight: 600\n        }}>\n            Showing posts from <span style={{ fontWeight: 800, color: 'var(--vc-ink)' }}>\n              {followedIds.length} {followedIds.length === 1 ? 'caller' : 'callers'}\n            </span> you follow.\n          </div>\n          {followingFeed.map((p) =>\n        <VCFeedCard key={p.id} post={p}\n        onOpen={() => onOpenPost(p)}\n        onShare={() => onShare(p)}\n        onOpenComments={onOpenComments}\n        onOpenMarket={onOpenMarket}\n        onOpenUser={onOpenUser}\n        isFollowing={!!follows[p.user]}\n        onToggleFollow={toggleFollow} />\n\n        )}\n        </div> :\n\n      <div style={{ padding: '0 14px' }}>\n          <div className=\"card\" style={{ padding: 24, textAlign: 'center', marginTop: 20 }}>\n            <div style={{ fontSize: 44, marginBottom: 8 }}>\ud83d\udc40</div>\n            <div className=\"display\" style={{ fontSize: 19, fontWeight: 800, marginBottom: 6 }}>Follow predictors to see their calls</div>\n            <div style={{ color: 'var(--vc-ink-2)', fontSize: 13, marginBottom: 16, lineHeight: 1.4 }}>\n              Add friends or the top accuracy callers to your Following feed.\n            </div>\n            <button onClick={onOpenSearch} className=\"btn-reset press\" style={{\n            height: 42, padding: '0 22px', borderRadius: 999,\n            background: 'var(--vc-bg-2)', color: 'var(--vc-ink)', fontWeight: 700, fontSize: 14\n          }} data-comment-anchor=\"534033c7a7-button-748-13\">Find predictors</button>\n          </div>\n\n          <div style={{ marginTop: 22 }}>\n            <div style={{\n            padding: '0 6px 10px',\n            display: 'flex', alignItems: 'baseline', justifyContent: 'space-between'\n          }}>\n              <div style={{\n              fontSize: 12, fontWeight: 800, color: 'var(--vc-ink-2)',\n              textTransform: 'uppercase', letterSpacing: '0.06em'\n            }}>Suggested for you</div>\n              <button onClick={onOpenTopCallers} className=\"btn-reset press\" style={{\n              fontSize: 16, fontWeight: 600, color: 'var(--vc-ink)',\n              textDecoration: 'underline', textUnderlineOffset: 3,\n              display: 'inline-flex', alignItems: 'center', gap: 3\n            }} data-comment-anchor=\"2a552b9110-button-763-15\">\n                View All {VCIcon.chevR('var(--vc-ink)', 16)}\n              </button>\n            </div>\n            {VC_SUGGESTED.map((s) => {\n            const u = vcUser(s.user);\n            if (!u) return null;\n            const isFollowing = !!follows[s.user];\n            return (\n              <div key={s.user} className=\"card press\" role=\"button\" tabIndex={0}\n                onClick={() => onOpenUser && onOpenUser(s.user)}\n                onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onOpenUser && onOpenUser(s.user); } }}\n                style={{\n                padding: 12, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer'\n              }}>\n                  <VCAvatar user={u} size={44} />\n                  <div style={{ flex: 1, minWidth: 0 }}>\n                    {/* line 1: Name \u00b7 @handle  + X icon (no dot before it) */}\n                    <div style={{ display: 'flex', alignItems: 'center', gap: 5, minWidth: 0 }}>\n                      <span style={{ fontWeight: 700, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flexShrink: 0 }}>{u.name}</span>\n                      <span style={{ color: 'var(--vc-ink-2)', fontSize: 12, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>@{u.handle}</span>\n                      {vcHasXHandle(s.user) && (\n                        <a href=\"https://x.com/icebean10\" target=\"_blank\" rel=\"noopener noreferrer\" onClick={(e) => e.stopPropagation()}\n                          style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0, textDecoration: 'none' }}>\n                          <span style={{ width: 16, height: 16, borderRadius: 5, background: '#000', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>\n                            <svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z\"/></svg>\n                          </span>\n                        </a>\n                      )}\n                    </div>\n                    {/* line 2: N predictions \u00b7 Y% accuracy \u00b7 +$Z (green) \u2014 one line */}\n                    <div style={{ color: 'var(--vc-ink-2)', fontSize: 11, display: 'flex', gap: 4, alignItems: 'center', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden' }}>\n                      <span className=\"tab-nums\">{s.preds.toLocaleString()} predictions</span>\n                      <span style={{ color: 'var(--vc-ink-3)' }}>\u00b7</span>\n                      <span className=\"tab-nums\" style={{ color: 'var(--vc-success)', fontWeight: 700 }}>{s.roi}</span>\n                    </div>\n                  </div>\n                  <VCFollowButton following={isFollowing} height={34}\n                  onClick={(e) => { if (e && e.stopPropagation) e.stopPropagation(); toggleFollow(s.user); }} />\n                </div>);\n\n          })}\n\n            {/* trailing View all \u2192 Leaders */}\n            <button onClick={onOpenTopCallers} className=\"btn-reset press\" style={{\n            width: '100%', padding: '14px 0 4px',\n            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 3,\n            fontSize: 16, fontWeight: 600, color: 'var(--vc-ink)',\n            textDecoration: 'underline', textUnderlineOffset: 3\n          }}>\n              View All {VCIcon.chevR('var(--vc-ink)', 16)}\n            </button>\n          </div>\n        </div>\n      }\n\n      {/* compose-post FAB lives in app.jsx (above this scroll container) so it stays visible while scrolling */}\n    </div>);\n\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Post detail (full thread) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCPostDetail({ post, onBack, onOpenUser }) {\n  const [csort, setCsort] = useState('Top');\n  const u = vcUser(post.user);\n  const v = vcVideo(post.video);\n  const m = post.market;\n  const ch = vcChannel(v.channel);\n\n  const COMMENTS = [\n  { u: 'aria', t: '1h', body: 'Hook is doing all the work but the dropoff at 4:30 is brutal. Taking the 25M tier as NO.', likes: 24 },\n  { u: 'devon', t: '2h', body: 'Long the 10M tier all day. Easy yes.', likes: 18 },\n  { u: 'nomi', t: '2h', body: 'What\\'s the API snapshot interval? Day-boundary vs rolling?', likes: 6 },\n  { u: 'kai', t: '3h', body: 'Crowd is high, this is overpriced. ESPECIALLY at 50M.', likes: 41 },\n  { u: 'sasha', t: '4h', body: 'Algo is pushing it hard rn. 25M is the floor.', likes: 12 }];\n\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 100px' }}>\n      {/* sub header */}\n      <div style={{\n        padding: '4px 16px 14px', display: 'flex', alignItems: 'center', gap: 12,\n        position: 'sticky', top: 0, background: 'var(--vc-bg)', zIndex: 10\n      }}>\n        <VCBackButton onClick={onBack} />\n        <div className=\"display\" style={{ fontSize: 18, fontWeight: 800 }}>Post</div>\n      </div>\n\n      <div style={{ padding: '0 14px' }}>\n        <VCFeedCard post={post} onOpen={() => {}} onShare={() => {}} onOpenUser={onOpenUser} />\n\n        {/* resolution source expandable */}\n        <div className=\"card\" style={{ padding: 14, marginBottom: 14 }}>\n          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>\n            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>\n              <VCResolutionChip />\n              <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--vc-ink-2)' }}>Resolution source</span>\n            </div>\n            {VCIcon.chevD('var(--vc-ink-2)')}\n          </div>\n          <div style={{\n            fontFamily: '\"SF Mono\", ui-monospace, monospace', fontSize: 11.5,\n            background: 'var(--vc-bg)', borderRadius: 10, padding: 10, marginBottom: 10,\n            color: 'var(--vc-ink-2)', lineHeight: 1.5, wordBreak: 'break-all'\n          }}>\n            GET youtube.com/v3/videos<br />?part=statistics&id={v.id}<br />fields: <span style={{ color: 'var(--vc-red)' }}>statistics.viewCount</span>\n          </div>\n          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--vc-ink-2)' }}>\n            <span>Last fetched: 3m ago</span>\n            <span className=\"tab-nums\">{vcFormatViews(v.views)}</span>\n          </div>\n        </div>\n\n        {/* comments header */}\n        <div style={{ padding: '6px 8px 12px', display: 'flex', alignItems: 'center', gap: 14 }}>\n          <span className=\"display\" style={{ fontSize: 18, fontWeight: 800 }}>Comments</span>\n          <VCSegmented value={csort} onChange={setCsort} options={['Top', 'Newest']} height={26} fontSize={12} />\n        </div>\n\n        {/* comments */}\n        {COMMENTS.map((c, i) => {\n          const cu = vcUser(c.u);\n          return (\n            <div key={i} className=\"card\" style={{ padding: 12, marginBottom: 10 }}>\n              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>\n                <div onClick={() => onOpenUser && onOpenUser(c.u)} style={{ cursor: 'pointer', flexShrink: 0 }}>\n                  <VCAvatar user={cu} size={34} />\n                </div>\n                <div style={{ flex: 1, minWidth: 0 }}>\n                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginBottom: 2 }}>\n                    <span style={{ fontWeight: 700, fontSize: 13 }}>{cu.name}</span>\n                    <span style={{ color: 'var(--vc-ink-3)', fontSize: 11 }}>@{cu.handle} \u00b7 {c.t}</span>\n                  </div>\n                  <div style={{ fontSize: 13.5, lineHeight: 1.42, marginBottom: 6 }}>{c.body}</div>\n                  <div style={{ display: 'flex', gap: 14, fontSize: 12, color: 'var(--vc-ink-2)' }}>\n                    <button className=\"btn-reset\" style={{ display: 'flex', alignItems: 'center', gap: 4 }}>\n                      <span>\u2764</span> <span className=\"tab-nums\">{c.likes}</span>\n                    </button>\n                    <button className=\"btn-reset\">Reply</button>\n                  </div>\n                </div>\n              </div>\n            </div>);\n\n        })}\n      </div>\n\n      {/* composer */}\n      <div style={{\n        position: 'absolute', left: 0, right: 0, bottom: 0,\n        padding: '10px 14px 28px', background: 'var(--vc-bg)',\n        borderTop: '1px solid var(--vc-line)',\n        display: 'flex', alignItems: 'center', gap: 8\n      }}>\n        <VCAvatar user=\"marcus\" size={34} />\n        <div style={{\n          flex: 1, height: 40, borderRadius: 999, background: 'var(--vc-surface)',\n          padding: '0 16px', display: 'flex', alignItems: 'center',\n          color: 'var(--vc-ink-3)', fontSize: 14,\n          border: '1px solid var(--vc-line)'\n        }}>Add a comment\u2026</div>\n        <button className=\"btn-reset press\" style={{\n          width: 40, height: 40, borderRadius: 999, background: 'var(--vc-red)',\n          color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center'\n        }}>\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" strokeWidth=\"2.4\" strokeLinecap=\"round\" strokeLinejoin=\"round\"><path d=\"M5 12h14\" /><path d=\"M13 5l7 7-7 7\" /></svg>\n        </button>\n      </div>\n    </div>);\n\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Top Callers (full list, 50 users) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCTopCallers({ onBack }) {\n  const [tab, setTab] = useState('week');\n  const [follows, setFollows] = useState({});\n  const toggle = (id) => setFollows((p) => ({ ...p, [id]: !p[id] }));\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      <div style={{\n        padding: '8px 20px 16px',\n        display: 'flex', alignItems: 'center', gap: 12,\n      }}>\n        <VCBackButton onClick={onBack} />\n        <h2 className=\"vc-page-title\">Top Callers</h2>\n      </div>\n\n      <div style={{ padding: '0 16px 14px', display: 'flex', justifyContent: 'center' }}>\n        <VCSegmented value={tab} onChange={setTab}\n          options={[{ id: 'day', label: 'Today' }, { id: 'week', label: 'This week' }, { id: 'all', label: 'All-time' }]} />\n      </div>\n\n      <div style={{ padding: '0 14px' }}>\n        <div className=\"card\" style={{ padding: 6 }}>\n          {VC_TOP_CALLERS.map((c, i) => {\n            const u = vcUser(c.user);\n            if (!u) return null;\n            const isFollowing = !!follows[c.user];\n            const rankColor = i === 0 ? '#F59E0B' : i === 1 ? '#9CA3AF' : i === 2 ? '#C2562F' : 'var(--vc-ink-2)';\n            return (\n              <div key={c.user} style={{\n                padding: '12px 12px', display: 'flex', alignItems: 'center', gap: 12,\n                borderBottom: i < VC_TOP_CALLERS.length - 1 ? '1px solid var(--vc-line-soft)' : 'none'\n              }}>\n                <span className=\"tab-nums display\" style={{\n                  width: 28, textAlign: 'center', fontWeight: 800, fontSize: 14, color: rankColor\n                }}>{i + 1}</span>\n                <VCAvatar user={u} size={42} />\n                <div style={{ flex: 1, minWidth: 0 }}>\n                  <div style={{ fontWeight: 700, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{u.name}</div>\n                  {/* line 1: @handle \u00b7 N predictions */}\n                  <div style={{ color: 'var(--vc-ink-2)', fontSize: 12, display: 'flex', gap: 5, alignItems: 'center' }}>\n                    <span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>@{u.handle}</span>\n                    <span style={{ color: 'var(--vc-ink-3)' }}>\u00b7</span>\n                    <span className=\"tab-nums\">{c.preds.toLocaleString()} predictions</span>\n                  </div>\n                  {/* line 2: Y% accuracy \u00b7 +$Z (green) */}\n                  <div style={{ color: 'var(--vc-ink-2)', fontSize: 12, display: 'flex', gap: 5, alignItems: 'center', marginTop: 1 }}>\n                    <span className=\"tab-nums\">{c.acc}% accuracy</span>\n                    <span style={{ color: 'var(--vc-ink-3)' }}>\u00b7</span>\n                    <span className=\"tab-nums\" style={{ color: 'var(--vc-success)', fontWeight: 700 }}>{c.roi}</span>\n                  </div>\n                </div>\n                <VCFollowButton following={isFollowing} height={32}\n                  onClick={() => toggle(c.user)} />\n              </div>);\n\n          })}\n        </div>\n      </div>\n    </div>);\n\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Compose Post sheet \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCComposePost({ onClose, onPublish }) {\n  const [step, setStep] = useState('picker'); // 'picker' | 'write'\n  const [position, setPosition] = useState(null);\n  const [text, setText] = useState('');\n  const me = vcUser('marcus');\n\n  const fmt$ = (n) => {\n    const abs = Math.abs(n);\n    if (abs >= 1000) return (n < 0 ? '-' : '') + '$' + (abs / 1000).toFixed(2) + 'k';\n    return (n < 0 ? '-' : '') + '$' + abs.toFixed(2);\n  };\n\n  return (\n    <div onClick={onClose} className=\"screen-enter\" style={{\n      position: 'absolute', inset: 0, zIndex: 100,\n      background: 'rgba(15,15,15,0.55)',\n      display: 'flex', flexDirection: 'column', justifyContent: 'flex-end'\n    }}>\n      <div onClick={(e) => e.stopPropagation()} className=\"sheet-enter\" style={{\n        background: 'var(--vc-bg)',\n        borderRadius: '24px 24px 0 0',\n        height: step === 'picker' ? '68%' : '88%',\n        display: 'flex', flexDirection: 'column',\n        overflow: 'hidden',\n        boxShadow: '0 -8px 32px rgba(0,0,0,0.18)',\n        transition: 'height 0.22s ease'\n      }}>\n        {/* drag handle */}\n        <div style={{ display: 'flex', justifyContent: 'center', padding: '10px 0 6px' }}>\n          <div style={{ width: 38, height: 5, borderRadius: 999, background: 'var(--vc-line)' }} />\n        </div>\n\n        {/* header */}\n        <div style={{\n          padding: '6px 14px 14px', display: 'flex', alignItems: 'center', gap: 12,\n          borderBottom: '1px solid var(--vc-line-soft)'\n        }}>\n          {step === 'write' ?\n          <button onClick={() => setStep('picker')} className=\"btn-reset press\" style={{\n            width: 32, height: 32, borderRadius: 999, display: 'flex',\n            alignItems: 'center', justifyContent: 'center',\n            color: 'var(--vc-ink)'\n          }}>{VCIcon.back('var(--vc-ink)', 20)}</button> :\n\n          <button onClick={onClose} className=\"btn-reset press\" style={{\n            fontSize: 14, fontWeight: 600, color: 'var(--vc-ink-2)'\n          }}>Cancel</button>\n          }\n          <div className=\"display\" style={{ flex: 1, fontSize: 16, fontWeight: 800, textAlign: 'center' }}>\n            {step === 'picker' ? 'New post' : 'Write post'}\n          </div>\n          {step === 'write' ?\n          <button\n            disabled={!text.trim()}\n            onClick={() => {onPublish({ position, text });}}\n            className=\"btn-reset press\" style={{\n              height: 32, padding: '0 14px', borderRadius: 999,\n              background: text.trim() ? 'var(--vc-red)' : 'var(--vc-bg-2)',\n              color: text.trim() ? 'white' : 'var(--vc-ink-3)',\n              fontWeight: 800, fontSize: 13,\n              boxShadow: text.trim() ? '0 3px 12px rgba(255,0,51,0.28)' : 'none'\n            }}>Post</button> :\n\n          <div style={{ width: 52 }} />\n          }\n        </div>\n\n        {step === 'picker' &&\n        <div style={{ flex: 1, overflowY: 'auto', padding: '14px 14px 24px' }}>\n            <div style={{ fontSize: 13.5, color: 'var(--vc-ink-2)', marginBottom: 14, lineHeight: 1.5 }}>\n              Pick one of your open positions to share. The community can react and challenge your call.\n            </div>\n            <div style={{\n            fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)',\n            textTransform: 'uppercase', letterSpacing: '0.06em', margin: '4px 4px 10px'\n          }}>\n              Open positions \u00b7 <span className=\"tab-nums\">{VC_OPEN_POSITIONS.length}</span>\n            </div>\n            {VC_OPEN_POSITIONS.map((p) => {\n            const v = vcVideo(p.video);\n            const isYes = p.side === 'YES';\n            const sidePct = isYes ? p.currentYes : 100 - p.currentYes;\n            const entrySidePct = isYes ? p.entry : 100 - p.entry;\n            const { profit, roiPct } = vcPositionROI(p.side, p.entry, p.currentYes, p.stake);\n            const tone = isYes ? 'var(--vc-success)' : 'var(--vc-danger)';\n            const pillBg = isYes ? 'rgba(22,163,74,0.12)' : 'rgba(217,48,37,0.12)';\n            return (\n              <button\n                key={p.id}\n                onClick={() => {setPosition(p);setStep('write');}}\n                className=\"btn-reset press card\" style={{\n                  width: '100%', padding: 12, marginBottom: 10,\n                  display: 'flex', gap: 12, alignItems: 'flex-start', textAlign: 'left'\n                }}>\n                  <div style={{ width: 72, flexShrink: 0 }}>\n                    <VCThumb video={v} height={52} rounded={10} hidePlay />\n                  </div>\n                  <div style={{ flex: 1, minWidth: 0 }}>\n                    <div style={{\n                    fontWeight: 700, fontSize: 13, lineHeight: 1.3, marginBottom: 4,\n                    display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical',\n                    overflow: 'hidden'\n                  }}>{v.title}</div>\n                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>\n                      <span style={{\n                      padding: '3px 8px', borderRadius: 8,\n                      background: pillBg, color: tone, fontWeight: 800, fontSize: 11.5\n                    }}>\n                        {p.side === 'YES' ? 'Yes' : 'No'} <span className=\"tab-nums\">{entrySidePct}%</span>\n                      </span>\n                      <span className=\"tab-nums display\" style={{ fontSize: 14, fontWeight: 800 }}>${p.stake.toLocaleString()}</span>\n                    </div>\n                    <div className=\"tab-nums\" style={{\n                    fontSize: 11.5, fontWeight: 700,\n                    color: profit >= 0 ? 'var(--vc-success)' : 'var(--vc-danger)'\n                  }}>\n                      {profit >= 0 ? '+' : ''}{fmt$(profit)} ({profit >= 0 ? '+' : ''}{roiPct.toFixed(2)}%)\n                    </div>\n                  </div>\n                  {VCIcon.chevR('var(--vc-ink-3)', 18)}\n                </button>);\n\n          })}\n          </div>\n        }\n\n        {step === 'write' && position && (() => {\n          const v = vcVideo(position.video);\n          const isYes = position.side === 'YES';\n          const sidePct = isYes ? position.currentYes : 100 - position.currentYes;\n          const entrySidePct = isYes ? position.entry : 100 - position.entry;\n          const { profit, roiPct } = vcPositionROI(position.side, position.entry, position.currentYes, position.stake);\n          const probUp = position.currentYes >= position.entry;\n          const arrowColor = probUp ? 'var(--vc-success)' : 'var(--vc-danger)';\n          const pillBg = isYes ? 'rgba(22,163,74,0.12)' : 'rgba(217,48,37,0.12)';\n          const pillText = isYes ? 'var(--vc-success)' : 'var(--vc-danger)';\n          const Arrow = ({ color, up }) =>\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke={color} strokeWidth=\"2.6\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n              {up ?\n            <React.Fragment><path d=\"M7 17L17 7\" /><path d=\"M9 7h8v8\" /></React.Fragment> :\n            <React.Fragment><path d=\"M7 7l10 10\" /><path d=\"M17 9v8H9\" /></React.Fragment>}\n            </svg>;\n\n\n          return (\n            <div style={{ flex: 1, overflowY: 'auto', padding: '14px 14px 24px' }}>\n              {/* author row */}\n              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>\n                <VCAvatar user={me} size={40} />\n                <div style={{ flex: 1, minWidth: 0 }}>\n                  <div style={{ fontWeight: 700, fontSize: 14 }}>{me.name}</div>\n                  <div style={{ color: 'var(--vc-ink-2)', fontSize: 12 }}>@{me.handle}</div>\n                </div>\n              </div>\n\n              {/* textarea */}\n              <textarea\n                autoFocus\n                value={text}\n                onChange={(e) => setText(e.target.value)}\n                placeholder=\"What's your take on this call?\"\n                rows={4}\n                style={{\n                  width: '100%', border: 0, outline: 0, resize: 'none',\n                  background: 'transparent', fontFamily: 'inherit',\n                  fontSize: 16, lineHeight: 1.45, color: 'var(--vc-ink)',\n                  padding: 0, marginBottom: 12\n                }} />\n              \n\n              {/* position preview (mini version of the feed-card position panel) */}\n              <div style={{\n                padding: '14px 0 12px',\n                borderTop: '1px solid var(--vc-line-soft)',\n                borderBottom: '1px solid var(--vc-line-soft)',\n                marginBottom: 12\n              }}>\n                <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>\n                  <div style={{ width: 84, flexShrink: 0 }}>\n                    <VCThumb video={v} height={60} rounded={10} hidePlay />\n                  </div>\n                  <div style={{ flex: 1, minWidth: 0 }}>\n                    <div style={{\n                      fontWeight: 700, fontSize: 12.5, lineHeight: 1.3,\n                      display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden'\n                    }}>{v.title}</div>\n                    <div style={{ fontSize: 11.5, color: 'var(--vc-ink-2)', marginTop: 2 }}>{vcChannel(v.channel).name}</div>\n                  </div>\n                </div>\n\n                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>\n                  <span style={{\n                    display: 'inline-flex', alignItems: 'center',\n                    padding: '5px 11px', borderRadius: 10,\n                    background: pillBg, color: pillText,\n                    fontWeight: 800, fontSize: 13.5\n                  }}>\n                    {position.side === 'YES' ? 'Yes' : 'No'}&nbsp;<span className=\"tab-nums\">{entrySidePct}%</span>\n                  </span>\n                  <div className=\"display tab-nums\" style={{ fontSize: 20, fontWeight: 800, letterSpacing: '-0.02em' }}>\n                    ${position.stake.toLocaleString()}\n                  </div>\n                </div>\n\n                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n                  <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13.5, fontWeight: 600, color: 'var(--vc-ink-2)' }}>\n                    <span className=\"tab-nums\">{entrySidePct}%</span>\n                    <Arrow color={arrowColor} up={probUp} />\n                    <span className=\"tab-nums\" style={{ color: 'var(--vc-ink)', fontWeight: 700 }}>{sidePct}%</span>\n                  </div>\n                  <div className=\"tab-nums\" style={{\n                    fontSize: 13.5, fontWeight: 800,\n                    color: profit >= 0 ? 'var(--vc-success)' : 'var(--vc-danger)'\n                  }}>\n                    <VCLiveNumber value={sidePct} format={() => (profit >= 0 ? '+' : '') + fmt$(profit)} /> <span style={{ fontWeight: 700 }}>(<VCLiveNumber value={sidePct} format={() => (profit >= 0 ? '+' : '') + roiPct.toFixed(2) + '%'} />)</span>\n                  </div>\n                </div>\n              </div>\n\n              <button\n                onClick={() => {setPosition(null);setStep('picker');}}\n                className=\"btn-reset press\"\n                style={{\n                  height: 38, padding: '0 14px', borderRadius: 999,\n                  background: 'var(--vc-bg-2)', fontWeight: 700, fontSize: 13,\n                  display: 'inline-flex', alignItems: 'center', gap: 6,\n                  color: 'var(--vc-ink-2)'\n                }}>\n                {VCIcon.back('var(--vc-ink-2)', 14)} Change position\n              </button>\n            </div>);\n\n        })()}\n      </div>\n    </div>);\n\n}\n\nObject.assign(window, { VCFeedCard, VCHome, VCPostDetail, VCCommentsSheet, VCTopCallers, VCComposePost });\n\n// ===== ecc96c00-114e-4d43-a319-e0d5b74f8716.js =====\n// ViewsCall \u2014 Explore + Topic + Market detail + Leaderboard\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Tier row (used in Explore card + market detail + create flow) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCTierRow({ tier, onClick, showBoth = false }) {\n  // Live odds: walk the YES% at a random 1\u20135s cadence; NO% is the complement.\n  const yes = useLiveValue(tier.yes, { min: 1, max: 99, amp: 2 });\n  return (\n    <div role=\"button\" tabIndex={0} onClick={onClick}\n      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick && onClick(); } }}\n      className=\"press\" style={{\n      width: '100%', padding: '10px 14px',\n      display: 'flex', alignItems: 'center', justifyContent: 'space-between',\n      background: 'var(--vc-bg)', borderRadius: 14,\n      border: 'none', cursor: 'pointer',\n    }}>\n      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>\n        <span style={{ fontSize: 18, fontWeight: 800, color: 'var(--vc-ink-2)' }}>\u2265</span>\n        <span className=\"tab-nums display\" style={{ fontSize: 17, fontWeight: 800, letterSpacing: '-0.01em' }}>\n          {vcFormatViews(tier.gt)}\n        </span>\n        <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--vc-ink-2)' }}>views</span>\n      </div>\n      {showBoth ? (\n        <div style={{ display: 'flex', gap: 6 }}>\n          <VCYesNo side=\"YES\" pct={yes} size=\"s\" live />\n          <VCYesNo side=\"NO\" pct={100 - yes} size=\"s\" live />\n        </div>\n      ) : (\n        <VCYesNo side=\"YES\" pct={yes} size=\"s\" hideLabel live />\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Explore market card \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCExploreCard({ market, onOpen }) {\n  const v = vcVideo(market.video);\n  const ch = vcChannel(v.channel);\n  // Per-market countdown target: deterministic offset from id so each card\n  // differs and decreases in real time. Anchored once per mount.\n  const endsAt = useMemo(() => Date.now() + vcMarketEndOffset(market.id), [market.id]);\n  // \"May 30\" \u2192 \"30 May 2026\"\n  const resolveDate = (() => {\n    const parts = (market.deadline || '').split(' ');\n    if (parts.length === 2) return `${parts[1]} ${parts[0]} 2026`;\n    return market.deadline;\n  })();\n  return (\n    <div className=\"card\" style={{ padding: 14, marginBottom: 14 }}>\n      <div className=\"press\" onClick={onOpen}>\n        <VCThumb video={v} height={172} rounded={14} />\n      </div>\n      <div style={{ padding: '12px 4px 6px' }}>\n        <div style={{ fontWeight: 700, fontSize: 14.5, lineHeight: 1.35, marginBottom: 4 }}>\n          {v.title}\n        </div>\n        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--vc-ink-2)', marginBottom: 12 }}>\n          <span style={{ fontWeight: 600 }}>{ch.name}</span>\n          <span>\u00b7</span>\n          <span className=\"tab-nums\">{vcFormatViews(v.views)} now</span>\n          <span>\u00b7</span>\n          <span>{v.age}</span>\n        </div>\n      </div>\n\n      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>\n        {market.tiers.map((t, i) => <VCTierRow key={i} tier={t} onClick={() => onOpen(i)} />)}\n      </div>\n\n      <div style={{\n        marginTop: 12, paddingTop: 12,\n        marginLeft: -14, marginRight: -14, paddingLeft: 14, paddingRight: 14,\n        borderTop: '1px dashed var(--vc-line)',\n        fontSize: 12, color: 'var(--vc-ink-2)',\n      }}>\n        {/* line 1: Resolves date \u00b7 vol  +  action buttons */}\n        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>\n          <span style={{ fontWeight: 600 }}>Resolves {resolveDate}</span>\n          <span>\u00b7</span>\n          <span className=\"tab-nums\" style={{ fontWeight: 600 }}>${vcFormatCoins(market.vol)} vol</span>\n        </div>\n        {/* line 2: live countdown */}\n        <div style={{ marginTop: 6, color: 'var(--vc-red)', fontWeight: 600 }}>\n          <VCCountdown target={endsAt} label=\"Ends in\" />\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Explore screen \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCExplore({ onOpenTopic, onOpenMarket, onSearch, onOpenTrending }) {\n  const [sort, setSort] = useState('Hot');\n  // Interests = which topic chips show under Explore. Default: all.\n  const [interests, setInterests] = useState(VC_TOPIC_LIST.map(t => t.id));\n  const [editOpen, setEditOpen] = useState(false);\n  const [draft, setDraft] = useState([]);\n  const openEdit = () => { setDraft(interests); setEditOpen(true); };\n  const toggleDraft = (id) => setDraft(d => d.includes(id) ? d.filter(x => x !== id) : [...d, id]);\n  const saveInterests = () => { setInterests(draft); setEditOpen(false); };\n  const shownTopics = VC_TOPIC_LIST.filter(t => interests.includes(t.id));\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      {/* All Topics \u2014 horizontal chips */}\n      <div style={{ marginBottom: 18 }}>\n        <div style={{\n          padding: '8px 20px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',\n        }}>\n          <h2 className=\"vc-page-title\">\n            Explore\n          </h2>\n          <button onClick={openEdit} className=\"btn-reset press\" style={{\n            fontSize: 13, fontWeight: 600, color: 'var(--vc-ink-2)',\n            display: 'inline-flex', alignItems: 'center', gap: 4,\n          }}>{VCIcon.edit('var(--vc-ink-2)', 14)} Edit interests</button>\n        </div>\n\n        <div style={{ overflowX: 'auto', padding: '4px 16px 4px', display: 'flex', gap: 8 }} className=\"no-scrollbar\">\n          {shownTopics.length > 0\n            ? shownTopics.map(t => (\n                <VCTopicChip key={t.id} topic={t} size=\"l\" onClick={() => onOpenTopic(t.id)} />\n              ))\n            : <button onClick={openEdit} className=\"btn-reset press\" style={{ fontSize: 13, color: 'var(--vc-ink-3)', padding: '8px 4px' }}>No interests selected \u2014 tap to add</button>}\n        </div>\n      </div>\n\n      {/* Trending */}\n      <div style={{ marginBottom: 24 }}>\n        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px', marginBottom: 12 }}>\n          <h2 className=\"display\" style={{ margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em' }}>Trending now \ud83d\udd25</h2>\n          <button onClick={onOpenTrending} className=\"btn-reset press\" style={{\n            display: 'inline-flex', alignItems: 'center', gap: 3,\n            fontSize: 16, fontWeight: 600, color: 'var(--vc-ink)',\n            textDecoration: 'underline', textUnderlineOffset: 3,\n          }}>View All {VCIcon.chevR('var(--vc-ink)', 16)}</button>\n        </div>\n        <div style={{ padding: '0 20px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>\n          {VC_TRENDING.map(t => {\n            const topic = VC_TOPIC_LIST.find(x => x.id === t.topic);\n            return (\n              <button key={t.topic} onClick={() => onOpenTopic(t.topic)} className=\"btn-reset card press\" style={{\n                padding: 14, textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 8,\n              }}>\n                <div style={{\n                  width: 44, height: 44, borderRadius: 12,\n                  background: 'var(--vc-bg)',\n                  display: 'flex', alignItems: 'center', justifyContent: 'center',\n                  fontSize: 22,\n                }}>{topic.emoji}</div>\n                <div style={{ fontWeight: 800, fontSize: 15 }}>{topic.label}</div>\n                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n                  <span className=\"tab-nums\" style={{ fontSize: 11, color: 'var(--vc-ink-2)', fontWeight: 600 }}>\n                    {t.count} predictions today\n                  </span>\n                  <VCSparkline data={t.spark} width={50} height={18} />\n                </div>\n              </button>\n            );\n          })}\n        </div>\n      </div>\n\n      {/* Curated markets */}\n      <div style={{ padding: '0 20px 12px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>\n        <h2 className=\"display\" style={{ margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em' }}>\n          Curated markets\n        </h2>\n        <VCSegmented value={sort} onChange={setSort} options={['Hot', 'New', 'Closing']} height={28} fontSize={11.5} />\n      </div>\n\n      <div style={{ padding: '0 14px' }}>\n        {(() => {\n          const list = ((window.__vcOrder && window.__vcOrder.explore) || VC_EXPLORE_MARKETS).slice();\n          if (sort === 'Hot') {\n            list.sort((a, b) => b.vol - a.vol);                                  // most volume first\n          } else if (sort === 'New') {\n            list.sort((a, b) => vcMarketAddedScore(b.id) - vcMarketAddedScore(a.id)); // newest first\n          } else if (sort === 'Closing') {\n            list.sort((a, b) => vcMarketEndOffset(a.id) - vcMarketEndOffset(b.id));   // soonest to end first\n          }\n          return list.map(m => (\n            <VCExploreCard key={m.id} market={m} onOpen={(tierIdx) => onOpenMarket(m, tierIdx)} />\n          ));\n        })()}\n      </div>\n\n      {/* \u2500\u2500 Edit interests bottom sheet \u2500\u2500 */}\n      {editOpen && (\n        <div onClick={() => setEditOpen(false)} style={{\n          position: 'absolute', inset: 0, zIndex: 60, touchAction: 'none', overscrollBehavior: 'none',\n          background: 'rgba(0,0,0,0.45)',\n          display: 'flex', alignItems: 'flex-end',\n          animation: 'vcFadeIn 0.2s ease',\n        }}>\n          <div onClick={(e) => e.stopPropagation()} className=\"sheet-enter\" style={{\n            width: '100%', background: 'var(--vc-surface)',\n            borderTopLeftRadius: 26, borderTopRightRadius: 26,\n            padding: '18px 16px 0',\n            maxHeight: '78%', display: 'flex', flexDirection: 'column',\n          }}>\n            {/* header */}\n            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14, flexShrink: 0 }}>\n              <div style={{ flex: 1 }} />\n              <div className=\"display\" style={{ fontSize: 19, fontWeight: 600 }}>Edit interests</div>\n              <div style={{ flex: 1, display: 'flex', justifyContent: 'flex-end' }}>\n                <button onClick={() => setEditOpen(false)} className=\"btn-reset press\" style={{\n                  width: 40, height: 40, borderRadius: 12, background: 'var(--vc-surface)',\n                  border: '1px solid var(--vc-border)',\n                  display: 'flex', alignItems: 'center', justifyContent: 'center',\n                }}>{VCIcon.close('var(--vc-ink)', 18)}</button>\n              </div>\n            </div>\n\n            {/* topic checkbox list */}\n            <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', touchAction: 'pan-y', overscrollBehavior: 'contain', paddingBottom: 4 }}>\n              {VC_TOPIC_LIST.map(t => {\n                const on = draft.includes(t.id);\n                return (\n                  <button key={t.id} onClick={() => toggleDraft(t.id)} className=\"btn-reset press\" style={{\n                    width: '100%', height: 56, padding: '0 14px', marginBottom: 8, borderRadius: 14,\n                    background: 'var(--vc-bg)', display: 'flex', alignItems: 'center', gap: 12, textAlign: 'left',\n                  }}>\n                    <span style={{ fontSize: 22 }}>{t.emoji}</span>\n                    <span style={{ flex: 1, fontWeight: 700, fontSize: 14.5 }}>{t.label}</span>\n                    <span style={{\n                      width: 24, height: 24, borderRadius: 8, flexShrink: 0,\n                      display: 'flex', alignItems: 'center', justifyContent: 'center',\n                      background: on ? 'var(--vc-red)' : 'transparent',\n                      border: on ? 'none' : '2px solid var(--vc-border)',\n                      transition: 'background 0.15s',\n                    }}>{on && VCIcon.check('white', 15)}</span>\n                  </button>\n                );\n              })}\n            </div>\n\n            {/* sticky Save bar */}\n            <div style={{\n              flexShrink: 0, padding: '12px 0 24px',\n              borderTop: '1px dashed var(--vc-line)',\n              background: 'var(--vc-surface)',\n            }}>\n              <button onClick={saveInterests} className=\"btn-reset press vc-btn-grad\" style={{\n                width: '100%', height: 48, borderRadius: 999, background: 'var(--vc-red)',\n                color: 'white', fontWeight: 700, fontSize: 15,\n              }}>Save {draft.length > 0 ? `(${draft.length})` : ''}</button>\n            </div>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Trending page (full ranked list) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCTrendingPage({ onBack, onOpenTopic }) {\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      <div style={{ padding: '8px 20px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>\n        <VCBackButton onClick={onBack} />\n        <h2 className=\"vc-page-title\">Trending now \ud83d\udd25</h2>\n      </div>\n\n      <div style={{ padding: '0 14px' }}>\n        {VC_TRENDING_RANK.map((tr, i) => {\n          const t = VC_TOPIC_LIST.find(x => x.id === tr.id);\n          if (!t) return null;\n          return (\n            <button key={tr.id} onClick={() => onOpenTopic(tr.id)} className=\"btn-reset press\" style={{\n              width: '100%', padding: '14px 16px', marginBottom: 8, borderRadius: 16, background: 'var(--vc-surface)',\n              display: 'flex', alignItems: 'center', gap: 14, boxShadow: '0 1px 2px rgba(0,0,0,0.04)', textAlign: 'left',\n            }}>\n              <span className=\"tab-nums display\" style={{ width: 24, fontSize: 16, fontWeight: 800, color: 'var(--vc-ink-3)' }}>{i + 1}</span>\n              <span style={{ fontSize: 24 }}>{t.emoji}</span>\n              <div style={{ flex: 1, minWidth: 0 }}>\n                <div style={{ fontWeight: 800, fontSize: 15.5 }}>{t.label}</div>\n                <div style={{ fontSize: 12, color: 'var(--vc-ink-2)' }} className=\"tab-nums\">{tr.count}k predictions</div>\n              </div>\n              {VCIcon.chevR('var(--vc-ink-3)', 18)}\n            </button>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Topic page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCTopicPage({ topicId, onBack, onOpenMarket }) {\n  const t = VC_TOPIC_LIST.find(x => x.id === topicId);\n  const [tab, setTab] = useState('Top');\n  // Stable per-topic predictions count (doesn't change when switching filters).\n  const predsK = useMemo(() => {\n    let h = 0;\n    for (let i = 0; i < topicId.length; i++) h = (h * 31 + topicId.charCodeAt(i)) | 0;\n    return 8 + (Math.abs(h) % 73); // 8\u201380k, deterministic per topic\n  }, [topicId]);\n  // Only the video list changes with the filter; the count above stays fixed.\n  const base = VC_EXPLORE_MARKETS.filter(m => vcVideo(m.video).cat === topicId || true);\n  const filtered = useMemo(() => {\n    const list = base.slice();\n    if (tab === 'New') list.reverse();\n    else if (tab === 'Closing soon') list.sort((a, b) => a.deadline.localeCompare(b.deadline));\n    return list.slice(0, 4);\n  }, [topicId, tab]);\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      <div style={{ padding: '4px 16px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>\n        <VCBackButton onClick={onBack} />\n      </div>\n\n      <div style={{ padding: '0 20px 16px', display: 'flex', alignItems: 'center', gap: 14 }}>\n        <div style={{\n          width: 64, height: 64, borderRadius: 18, background: 'var(--vc-surface)',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontSize: 34, boxShadow: '0 4px 14px rgba(0,0,0,0.05)',\n        }}>{t.emoji}</div>\n        <div style={{ flex: 1, minWidth: 0 }}>\n          <div className=\"display\" style={{ fontSize: 28, fontWeight: 800, letterSpacing: '-0.02em' }}>{t.label}</div>\n          <div style={{ color: 'var(--vc-ink-2)', fontSize: 13 }}>\n            <span className=\"tab-nums\">{predsK}k</span> predictions today\n          </div>\n        </div>\n      </div>\n\n      <div style={{ padding: '0 16px 16px' }}>\n        <VCSegmented value={tab} onChange={setTab} options={['Top', 'New', 'Closing soon']} />\n      </div>\n\n      <div style={{ padding: '0 14px' }}>\n        {filtered.map(m => <VCExploreCard key={m.id} market={m} onOpen={(tierIdx) => onOpenMarket(m, tierIdx)} />)}\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Expandable tier chart panel (used in market detail) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCTierChart({ tier, side, current, onClose, onConfirm }) {\n  // Generate deterministic 7-day history of YES probability that lands on `current`.\n  const points = useMemo(() => {\n    const seed = (tier.gt + (tier.yes || 0) * 7919);\n    let s = (Math.abs(seed) >>> 0) || 1;\n    const rand = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return (s / 0x7fffffff); };\n    const N = 56;\n    const out = [];\n    // start near a different anchor, drift toward `current`\n    const start = Math.max(8, Math.min(92, current + (rand() - 0.5) * 35));\n    for (let i = 0; i < N; i++) {\n      const u = i / (N - 1);\n      const trend = start + (current - start) * u;          // linear drift to current\n      const noise = (rand() - 0.5) * 8 * (1 - 0.4 * u);     // calming jitter\n      out.push(Math.max(3, Math.min(97, trend + noise)));\n    }\n    out[out.length - 1] = current; // anchor end\n    return out;\n  }, [tier.gt, current]);\n\n  const W = 320, H = 110, PAD_L = 8, PAD_R = 8, PAD_T = 10, PAD_B = 10;\n  const innerW = W - PAD_L - PAD_R, innerH = H - PAD_T - PAD_B;\n  const xAt = (i) => PAD_L + (i / (points.length - 1)) * innerW;\n  const yAtYes = (p) => PAD_T + (1 - p / 100) * innerH;\n  const yAtNo  = (p) => PAD_T + (1 - (100 - p) / 100) * innerH;\n\n  const yesPath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(2)} ${yAtYes(p).toFixed(2)}`).join(' ');\n  const noPath  = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(2)} ${yAtNo(p).toFixed(2)}`).join(' ');\n\n  // Scrubber state\n  const [scrubIdx, setScrubIdx] = useState(null);\n  const svgRef = useRef(null);\n  const lastVibeIdx = useRef(null);\n\n  const handleMove = (clientX) => {\n    const svg = svgRef.current;\n    if (!svg) return;\n    const rect = svg.getBoundingClientRect();\n    const localX = ((clientX - rect.left) / rect.width) * W;\n    const t = (localX - PAD_L) / innerW;\n    const idx = Math.max(0, Math.min(points.length - 1, Math.round(t * (points.length - 1))));\n    setScrubIdx(idx);\n    if (lastVibeIdx.current !== idx) {\n      lastVibeIdx.current = idx;\n      if (navigator.vibrate) try { navigator.vibrate(6); } catch (e) {}\n    }\n  };\n\n  const startScrub = (e) => {\n    const x = e.touches ? e.touches[0].clientX : e.clientX;\n    handleMove(x);\n  };\n  const moveScrub = (e) => {\n    if (scrubIdx === null) return;\n    const x = e.touches ? e.touches[0].clientX : e.clientX;\n    handleMove(x);\n  };\n  const endScrub = () => { setScrubIdx(null); lastVibeIdx.current = null; };\n\n  // Active vs passive line\n  const yes = side === 'YES';\n  const activeColor  = yes ? 'var(--vc-red)' : 'var(--vc-no)';\n  const passiveColor = 'rgba(160,160,160,0.7)';\n\n  // Stake state\n  const [stake, setStake] = useState(50);\n  const yesPct = scrubIdx === null ? current : Math.round(points[scrubIdx]);\n  const noPct  = 100 - yesPct;\n  const sidePct = yes ? yesPct : noPct;\n  const payout = stake > 0 && sidePct > 0 ? (stake / (sidePct / 100)) : 0;\n\n  // Format the scrubber timestamp (over a notional 7-day window ending now)\n  const scrubLabel = (idx) => {\n    const daysAgo = ((points.length - 1 - idx) / (points.length - 1)) * 7;\n    if (daysAgo < 0.05) return 'Now';\n    if (daysAgo < 1) return `${Math.round(daysAgo * 24)}h ago`;\n    return `${daysAgo.toFixed(1)}d ago`;\n  };\n\n  return (\n    <div style={{\n      marginTop: 12, padding: 14, borderRadius: 16,\n      background: 'var(--vc-surface)',\n      border: '1px solid var(--vc-line)',\n      animation: 'vcFadeIn 0.22s ease-out both',\n    }}>\n      {/* readout above chart */}\n      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>\n        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>\n          <span style={{\n            display: 'inline-flex', alignItems: 'center', gap: 5,\n            padding: '4px 9px', borderRadius: 8,\n            background: yes ? 'rgba(255,0,51,0.10)' : 'rgba(31,31,31,0.10)',\n            color: activeColor, fontWeight: 800, fontSize: 12.5,\n          }}>{side}</span>\n          <span className=\"display tab-nums\" style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em', color: activeColor }}>\n            {sidePct}%\n          </span>\n          <span className=\"tab-nums\" style={{ fontSize: 11.5, color: 'var(--vc-ink-2)', fontWeight: 600 }}>\n            other {yes ? noPct : yesPct}%\n          </span>\n        </div>\n        <span style={{ fontSize: 11, color: 'var(--vc-ink-3)', fontWeight: 600 }}>\n          {scrubIdx !== null ? scrubLabel(scrubIdx) : 'Drag to scrub \u00b7 7d'}\n        </span>\n      </div>\n\n      {/* chart */}\n      <div style={{ position: 'relative', userSelect: 'none', touchAction: 'none' }}>\n        <svg\n          ref={svgRef}\n          viewBox={`0 0 ${W} ${H}`}\n          width=\"100%\" height={H}\n          onMouseDown={startScrub} onMouseMove={moveScrub} onMouseUp={endScrub} onMouseLeave={endScrub}\n          onTouchStart={startScrub} onTouchMove={moveScrub} onTouchEnd={endScrub}\n          style={{ display: 'block' }}>\n          {/* baseline / grid */}\n          {[0, 0.25, 0.5, 0.75, 1].map((t, i) => (\n            <line key={i}\n              x1={PAD_L} x2={W - PAD_R}\n              y1={PAD_T + t * innerH} y2={PAD_T + t * innerH}\n              stroke=\"var(--vc-line)\" strokeWidth=\"0.6\"\n              strokeDasharray={t === 0.5 ? '0' : '2 3'} />\n          ))}\n          {/* passive line (the unselected side) */}\n          <path d={yes ? noPath : yesPath} fill=\"none\" stroke={passiveColor} strokeWidth=\"1.6\" strokeLinejoin=\"round\" strokeLinecap=\"round\" />\n          {/* active line */}\n          <path d={yes ? yesPath : noPath} fill=\"none\" stroke={activeColor} strokeWidth=\"2.4\" strokeLinejoin=\"round\" strokeLinecap=\"round\" />\n          {/* end dot */}\n          <circle cx={xAt(points.length - 1)} cy={yes ? yAtYes(current) : yAtNo(current)} r=\"3.2\" fill={activeColor} />\n          {/* scrubber */}\n          {scrubIdx !== null && (\n            <React.Fragment>\n              <line x1={xAt(scrubIdx)} x2={xAt(scrubIdx)} y1={PAD_T} y2={H - PAD_B} stroke=\"var(--vc-ink-2)\" strokeWidth=\"1\" strokeDasharray=\"3 2\" />\n              <circle cx={xAt(scrubIdx)} cy={yes ? yAtYes(points[scrubIdx]) : yAtNo(points[scrubIdx])} r=\"4\" fill={activeColor} stroke=\"white\" strokeWidth=\"2\" />\n              <circle cx={xAt(scrubIdx)} cy={yes ? yAtNo(points[scrubIdx]) : yAtYes(points[scrubIdx])} r=\"3\" fill=\"white\" stroke={passiveColor} strokeWidth=\"1.5\" />\n            </React.Fragment>\n          )}\n        </svg>\n        {/* legend / instructions overlay */}\n        <div style={{\n          position: 'absolute', left: 8, bottom: 4, display: 'flex', gap: 10,\n          fontSize: 10, color: 'var(--vc-ink-3)', fontWeight: 700,\n        }}>\n          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>\n            <span style={{ width: 10, height: 2, background: activeColor, borderRadius: 1 }} /> {side}\n          </span>\n          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>\n            <span style={{ width: 10, height: 2, background: passiveColor, borderRadius: 1 }} /> {yes ? 'NO' : 'YES'}\n          </span>\n        </div>\n      </div>\n\n      {/* selected side recap */}\n      <div style={{\n        display: 'flex', alignItems: 'center', justifyContent: 'space-between',\n        padding: '10px 14px 6px', marginTop: 8,\n        marginLeft: -14, marginRight: -14,\n        borderTop: '1px dashed var(--vc-line)',\n      }}>\n        <span style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--vc-ink-2)' }}>\n          Your side\n        </span>\n        <span style={{\n          display: 'inline-flex', alignItems: 'center', gap: 6,\n          padding: '4px 10px', borderRadius: 999,\n          background: activeColor, color: 'white', fontWeight: 800, fontSize: 12.5,\n        }}>\n          {side} <span className=\"tab-nums\" style={{ background: 'rgba(255,255,255,0.25)', padding: '1px 6px', borderRadius: 999, fontSize: 10.5 }}>{sidePct}%</span>\n        </span>\n      </div>\n\n      {/* amount input */}\n      <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em', margin: '4px 0 6px' }}>\n        Amount\n      </div>\n      <div style={{\n        display: 'flex', alignItems: 'center', gap: 8,\n        padding: '10px 12px', borderRadius: 14, background: 'var(--vc-bg)',\n        border: '1px solid var(--vc-line)',\n      }}>\n        <span className=\"display\" style={{ fontSize: 22, fontWeight: 800, color: 'var(--vc-ink-2)' }}>$</span>\n        <input\n          type=\"text\" inputMode=\"decimal\"\n          value={stake}\n          onChange={(e) => {\n            const n = Number(e.target.value.replace(/[^\\d.]/g, ''));\n            setStake(Number.isFinite(n) ? n : 0);\n          }}\n          style={{\n            flex: 1, border: 0, outline: 0, background: 'transparent',\n            fontSize: 22, fontWeight: 800, fontFamily: '\"SF Pro Rounded\", -apple-system, system-ui',\n            fontVariantNumeric: 'tabular-nums', minWidth: 0,\n            color: 'var(--vc-ink)',\n          }}\n        />\n        <div style={{ textAlign: 'right' }}>\n          <div style={{ fontSize: 10, color: 'var(--vc-ink-2)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em' }}>To win</div>\n          <div className=\"tab-nums\" style={{ fontSize: 14, fontWeight: 800, color: 'var(--vc-success)' }}>\n            ${payout.toFixed(2)}\n          </div>\n        </div>\n      </div>\n\n      <div style={{ display: 'flex', gap: 6, overflowX: 'auto', marginTop: 8 }} className=\"no-scrollbar\">\n        {[10, 25, 50, 100, 250, 500].map(v => (\n          <button key={v} onClick={() => setStake(v)} className=\"btn-reset press\" style={{\n            flex: '0 0 auto', height: 30, padding: '0 12px', borderRadius: 999,\n            background: stake === v ? 'var(--vc-ink)' : 'var(--vc-bg)',\n            color: stake === v ? 'white' : 'var(--vc-ink)',\n            fontWeight: 700, fontSize: 12,\n          }}>${v}</button>\n        ))}\n      </div>\n\n      <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>\n        <button onClick={onClose} className=\"btn-reset press\" style={{\n          flex: 1, height: 44, borderRadius: 14, background: 'var(--vc-bg)',\n          fontWeight: 700, fontSize: 13.5, color: 'var(--vc-ink-2)',\n        }}>Cancel</button>\n        <button onClick={() => onConfirm(side, stake)} className=\"btn-reset press\" style={{\n          flex: 2, height: 44, borderRadius: 14,\n          background: activeColor, color: 'white', fontWeight: 800, fontSize: 14,\n          boxShadow: yes ? '0 4px 14px rgba(255,0,51,0.3)' : '0 4px 14px rgba(31,31,31,0.18)',\n        }}>Place {side}</button>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Market detail page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction VCMarketDetail({ market, onBack, onShare, initialTier }) {\n  const v = vcVideo(market.video);\n  const ch = vcChannel(v.channel);\n  // {tierIdx, side} or null. If opened from a specific tier, show its chart immediately.\n  const [pickedKey, setPickedKey] = useState(\n    (initialTier !== undefined && initialTier !== null && market.tiers[initialTier])\n      ? { tier: initialTier, side: 'YES' }\n      : null\n  );\n\n  const onPick = (i, side) => {\n    if (pickedKey && pickedKey.tier === i && pickedKey.side === side) {\n      setPickedKey(null);\n    } else {\n      setPickedKey({ tier: i, side });\n    }\n  };\n\n  return (\n    <div className=\"screen-enter\" style={{ padding: '0 0 130px' }}>\n      <div style={{ padding: '4px 16px 8px', display: 'flex', alignItems: 'center', gap: 12 }}>\n        <VCBackButton onClick={onBack} />\n        <div style={{ flex: 1, textAlign: 'center', display: 'flex', justifyContent: 'center' }}>\n          <VCTopicChip topic={v.cat} size=\"s\" />\n        </div>\n        <button onClick={() => {}} className=\"btn-reset press\" style={{\n          width: 40, height: 40, borderRadius: 999, background: 'var(--vc-surface)',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          boxShadow: '0 1px 2px rgba(0,0,0,0.04)',\n        }}>{VCIcon.share('var(--vc-ink)', 18)}</button>\n      </div>\n\n      <div style={{ padding: '0 14px' }}>\n        <VCThumb video={v} height={210} rounded={18} />\n\n        <div style={{ padding: '14px 4px 8px' }}>\n          <div className=\"display\" style={{ fontSize: 20, fontWeight: 800, lineHeight: 1.25, letterSpacing: '-0.01em', marginBottom: 6 }}>\n            {v.title}\n          </div>\n          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--vc-ink-2)' }}>\n            <span style={{ fontWeight: 700, color: 'var(--vc-ink)' }}>{ch.name}</span>\n            <span>\u00b7</span>\n            <span className=\"tab-nums\">{vcFormatViews(v.views)} views</span>\n            <span>\u00b7</span>\n            <span>{v.age}</span>\n          </div>\n        </div>\n\n        {/* current views big stat */}\n        <div className=\"card\" style={{ padding: 16, marginBottom: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>\n          <div>\n            <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Current views</div>\n            <div className=\"display tab-nums\" style={{ fontSize: 32, fontWeight: 800, letterSpacing: '-0.02em' }}>\n              {vcFormatViews(v.views)}\n            </div>\n          </div>\n          <div style={{ textAlign: 'right' }}>\n            <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--vc-ink-2)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Resolves</div>\n            <div className=\"display\" style={{ fontSize: 16, fontWeight: 800 }}>{market.deadline}</div>\n            <div style={{ fontSize: 11, color: 'var(--vc-ink-2)', fontWeight: 600 }}>00:00 UTC</div>\n          </div>\n        </div>\n\n        {/* tier list */}\n        <div style={{ padding: '0 6px 8px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>\n          <span className=\"display\" style={{ fontSize: 18, fontWeight: 800 }}>Tiers</span>\n          <span style={{ fontSize: 12, color: 'var(--vc-ink-2)', fontWeight: 600 }}>{market.tiers.length} active</span>\n        </div>\n        <div className=\"card\" style={{ padding: 8, marginBottom: 14, display: 'flex', flexDirection: 'column', gap: 6 }}>\n          {market.tiers.map((t, i) => {\n            const isPicked = pickedKey && pickedKey.tier === i;\n            return (\n            <div key={i} style={{\n              padding: '14px 14px', borderRadius: 14,\n              background: isPicked ? 'var(--vc-bg-2)' : 'transparent',\n              transition: 'background 0.15s',\n            }}>\n              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>\n                <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>\n                  <span style={{ fontSize: 16, fontWeight: 800, color: 'var(--vc-ink-2)' }}>\u2265</span>\n                  <span className=\"tab-nums display\" style={{ fontSize: 18, fontWeight: 800 }}>{vcFormatViews(t.gt)}</span>\n                  <span style={{ fontSize: 12, color: 'var(--vc-ink-2)', fontWeight: 600 }}>views</span>\n                </div>\n                <div style={{ fontSize: 11, color: 'var(--vc-ink-2)', fontWeight: 700 }}>\n                  Need <span className=\"tab-nums\">+{vcFormatViews(Math.max(0, t.gt - v.views))}</span>\n                </div>\n              </div>\n              <VCConfBar yes={t.yes} height={5} />\n              <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>\n                <button onClick={() => onPick(i, 'YES')} className=\"btn-reset press\" style={{\n                  flex: 1, height: 44, borderRadius: 14,\n                  background: 'var(--vc-red)', color: 'white', fontWeight: 700, fontSize: 14,\n                  display: 'flex', alignItems: 'center',
